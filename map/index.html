<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>地图库 - 极光创工作室</title>
    <meta name="description" content="极光创工作室地图库 - 迷你世界地图作品展示">
    <meta name="keywords" content="极光创,迷你世界,地图,江都市,永昌市,安州市">
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f9fe;
            color: #1a2a3a;
            line-height: 1.7;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --blue-primary: #1a7fc4;
            --blue-primary-dark: #0f6aad;
            --blue-bg-light: #ecf5fa;
            --blue-bg-pale: #f5f9fe;
            --white: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --radius: 2px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--blue-primary);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: var(--radius);
        }
        .nav-links li a:hover {
            background: var(--blue-bg-light);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        /* 地图库专用 */
        .page-header {
            padding: 24px 0 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .page-header .sub {
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 180px;
            padding: 8px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--white);
            transition: border-color 0.25s;
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--blue-primary);
        }
        .search-bar .search-btn {
            background: var(--blue-primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s;
        }
        .search-bar .search-btn:hover {
            background: var(--blue-primary-dark);
        }

        /* 标签栏 - 横向滚动 */
        .tag-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 0 16px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .tag-bar::-webkit-scrollbar {
            height: 4px;
            background: var(--border-light);
        }
        .tag-bar::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 2px;
        }
        .tag-item {
            flex: 0 0 auto;
            padding: 4px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tag-item:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .tag-item.active {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
            background: var(--blue-bg-light);
        }

        /* 预告横向滚动 */
        .preview-section {
            margin: 16px 0 32px;
        }
        .preview-section .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .preview-section .preview-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .preview-section .preview-header .count {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .preview-scroll {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 12px;
            margin: 0 -4px;
        }
        .preview-scroll::-webkit-scrollbar {
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
        }
        .preview-scroll::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 3px;
        }
        .preview-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 20px;
            width: max-content;
            padding: 0 4px;
        }
        .preview-card {
            flex: 0 0 200px;
            max-width: 200px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .preview-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .preview-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
        }
        .preview-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .preview-card .body {
            padding: 10px 12px 12px;
        }
        .preview-card .body .title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-card .body .meta {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 2px;
        }
        .preview-empty {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            opacity: 0.4;
            font-size: 14px;
        }

        /* 全部地图卡片网格 */
        .map-grid-container {
            margin-top: 8px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .map-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .map-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--blue-primary);
            transform: translateY(-3px);
        }
        .map-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
        }
        .map-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .map-card .body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .map-card .body .tag {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 10px;
            border: 1.5px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 3px;
            letter-spacing: 0.3px;
            display: inline-block;
            line-height: 1.5;
            align-self: flex-start;
        }
        .map-card .body .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .map-card .body .date-row {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.55;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }
        .map-card .body .date-row i {
            font-size: 11px;
            opacity: 0.5;
        }
        .map-card .body .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            flex-wrap: wrap;
            gap: 2px 8px;
        }
        .map-card .body .meta-row .author {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .map-card .body .meta-row .author i {
            font-size: 10px;
            opacity: 0.5;
        }
        .map-card .body .meta-row .minid {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
        }
        .map-card .body .desc-box {
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 6px 10px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 48px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            background: var(--white);
            color: var(--text-dark);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 36px;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .pagination button.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination .info {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.5;
            padding: 0 8px;
        }
        .pagination .page-input {
            width: 50px;
            padding: 4px 6px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            text-align: center;
            font-size: 14px;
            outline: none;
        }
        .pagination .page-input:focus {
            border-color: var(--blue-primary);
        }

        /* 加载与空状态 */
        .loading-placeholder, .empty-placeholder {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            opacity: 0.4;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .loading-placeholder i {
            display: block;
            font-size: 28px;
            color: var(--blue-primary);
            margin-bottom: 10px;
        }

        /* 响应式 */
        @media (max-width: 992px) {
            .map-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links li a {
                padding: 10px 16px;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .preview-card {
                flex: 0 0 160px;
                max-width: 160px;
            }
            .preview-card .body .title {
                font-size: 13px;
            }
            .page-header h1 {
                font-size: 24px;
            }
            .search-bar input {
                min-width: 140px;
            }
            .tag-item {
                font-size: 12px;
                padding: 3px 12px;
            }
            .navbar-brand .brand-text {
                font-size: 17px;
            }
            .navbar-brand .logo {
                height: 28px;
            }
        }
        @media (max-width: 480px) {
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .map-card .body {
                padding: 8px 10px 10px;
            }
            .map-card .body .title {
                font-size: 13px;
            }
            .map-card .body .desc-box {
                font-size: 11px;
                padding: 4px 8px;
                min-height: 36px;
                -webkit-line-clamp: 2;
            }
            .map-card .body .tag {
                font-size: 9px;
                padding: 0 8px;
                border-width: 1px;
            }
            .map-card .body .date-row {
                font-size: 11px;
            }
            .map-card .body .meta-row {
                font-size: 11px;
            }
            .preview-card {
                flex: 0 0 140px;
                max-width: 140px;
            }
            .preview-card .body .title {
                font-size: 12px;
            }
            .search-bar input {
                font-size: 13px;
                padding: 6px 12px;
            }
            .search-bar .search-btn {
                font-size: 13px;
                padding: 6px 14px;
            }
            .container {
                padding: 0 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏（与主站一致） ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="./">主站</a></li>
                <li><a href="./map/" class="active">地图库</a></li>
                <li><a href="./blog/">极创博客</a></li>
                <li><a href="./Management/">管理层成员公示</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 地图库内容 ===== -->
    <main>
        <div class="container">
            <div class="page-header">
                <h1>地图库</h1>
                <div class="sub">所有极光创工作室发布的地图作品</div>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索地图名称、作者、迷你号..." />
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>

            <!-- 标签栏 -->
            <div class="tag-bar" id="tagBar">
                <span class="tag-item active" data-tag="all">全部</span>
                <span class="tag-item" data-tag="策划中">策划中</span>
                <span class="tag-item" data-tag="制作中">制作中</span>
                <span class="tag-item" data-tag="更新中">更新中</span>
                <span class="tag-item" data-tag="待发布">待发布</span>
                <span class="tag-item" data-tag="测试中">测试中</span>
                <span class="tag-item" data-tag="已完结">已完结</span>
                <span class="tag-item" data-tag="精选">精选</span>
            </div>

            <!-- 预告栏（待发布） -->
            <section class="preview-section" id="previewSection">
                <div class="preview-header">
                    <h3>即将发布 <span class="count" id="previewCount">0</span></h3>
                </div>
                <div class="preview-scroll" id="previewScroll">
                    <div class="preview-grid" id="previewGrid">
                        <div class="preview-empty">加载中...</div>
                    </div>
                </div>
            </section>

            <!-- 全部地图卡片 -->
            <div class="map-grid-container">
                <div class="map-grid" id="mapGrid">
                    <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载地图中...</div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button id="prevPage" disabled>‹</button>
                <span id="pageInfo" class="info">第 1 / 1 页</span>
                <button id="nextPage" disabled>›</button>
            </div>
        </div>
    </main>

    <!-- ===== 底部（与主站一致） ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span> Aurora Creation Studio</span>
        </div>
    </footer>

    <script>
        (function() {

            // ===== 移动端菜单 =====
            const toggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ===== 数据状态 =====
            let allMaps = []; // 所有解析后的地图对象
            let filteredMaps = []; // 当前筛选后的结果
            let currentPage = 1;
            const pageSize = 16; // 电脑4行4列，手机2列自动适配

            // DOM 元素
            const mapGrid = document.getElementById('mapGrid');
            const previewGrid = document.getElementById('previewGrid');
            const previewCount = document.getElementById('previewCount');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const tagBar = document.getElementById('tagBar');
            const pagination = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');

            // ===== 解析Issue =====
            function parseIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名地图';
                var body = issue.body || '';
                var author = '';
                var cover = '';
                var desc = '';
                var tag = '';
                var minid = '';

                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) {
                        author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^封面[：:]\s*(.+)/)) {
                        cover = trimmed.replace(/^封面[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^描述[：:]\s*(.+)/)) {
                        desc = trimmed.replace(/^描述[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^标签[：:]\s*(.+)/)) {
                        tag = trimmed.replace(/^标签[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim();
                    }
                });

                if (!author || author.trim() === '') author = '未知作者';
                if (!desc || desc.trim() === '') desc = '暂无描述';
                if (!minid || minid.trim() === '') minid = '未知';

                // 精选检测：标题中带 [精选]
                var isFeatured = /\[精选\]/.test(title);
                // 如果标签为空但有精选标记，则补一个“精选”标签（但不会覆盖已有的，精选作为独立标签）
                if (isFeatured && !tag) {
                    tag = '精选';
                }

                var dateObj = new Date(issue.created_at);
                var dateStr = dateObj.getFullYear() + '-' +
                    String(dateObj.getMonth() + 1).padStart(2, '0') + '-' +
                    String(dateObj.getDate()).padStart(2, '0');

                return {
                    id: issue.number,
                    title: title,
                    author: author,
                    cover: cover,
                    desc: desc,
                    tag: tag,
                    minid: minid,
                    date: dateStr,
                    raw: issue,
                    isFeatured: isFeatured
                };
            }

            // ===== 渲染卡片 =====
            function renderMapCard(map) {
                var coverHtml = '';
                if (map.cover && map.cover.trim() !== '' && map.cover.trim().startsWith('http')) {
                    coverHtml = '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">';
                } else {
                    coverHtml = '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';
                }
                var tagHtml = map.tag ? '<span class="tag">' + map.tag + '</span>' : '';
                var html = '<div class="map-card">';
                html += coverHtml;
                html += '<div class="body">';
                html += tagHtml;
                html += '<span class="title">' + map.title + '</span>';
                html += '<div class="date-row"><i class="fas fa-calendar-alt"></i> ' + map.date + '</div>';
                html += '<div class="meta-row">';
                html += '<span class="author"><i class="fas fa-user"></i> ' + map.author + '</span>';
                html += '<span class="minid">迷你号 ' + map.minid + '</span>';
                html += '</div>';
                html += '<div class="desc-box">' + map.desc + '</div>';
                html += '</div></div>';
                return html;
            }

            function renderPreviewCard(map) {
                var coverHtml = '';
                if (map.cover && map.cover.trim() !== '' && map.cover.trim().startsWith('http')) {
                    coverHtml = '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">';
                } else {
                    coverHtml = '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';
                }
                var html = '<div class="preview-card">';
                html += coverHtml;
                html += '<div class="body">';
                html += '<div class="title">' + map.title + '</div>';
                html += '<div class="meta">' + map.author + ' · ' + map.date + '</div>';
                html += '</div></div>';
                return html;
            }

            // ===== 分页渲染全部 =====
            function renderPage() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * pageSize;
                var end = Math.min(start + pageSize, total);
                var pageItems = filteredMaps.slice(start, end);

                if (pageItems.length === 0) {
                    mapGrid.innerHTML = '<div class="empty-placeholder">没有匹配的地图</div>';
                } else {
                    var html = '';
                    pageItems.forEach(function(map) {
                        html += renderMapCard(map);
                    });
                    mapGrid.innerHTML = html;
                }

                // 更新分页信息
                pageInfo.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
            }

            // ===== 渲染预告（待发布） =====
            function renderPreview() {
                var previewMaps = allMaps.filter(function(m) {
                    return m.tag === '待发布';
                });
                previewCount.textContent = previewMaps.length;
                if (previewMaps.length === 0) {
                    previewGrid.innerHTML = '<div class="preview-empty">暂无待发布地图</div>';
                    return;
                }
                var html = '';
                previewMaps.forEach(function(map) {
                    html += renderPreviewCard(map);
                });
                previewGrid.innerHTML = html;
            }

            // ===== 筛选与搜索 =====
            function applyFilters() {
                var searchTerm = searchInput.value.trim().toLowerCase();
                var activeTag = document.querySelector('.tag-item.active');
                var tagFilter = activeTag ? activeTag.dataset.tag : 'all';

                filteredMaps = allMaps.filter(function(map) {
                    // 标签筛选
                    if (tagFilter !== 'all') {
                        if (tagFilter === '精选') {
                            if (!map.isFeatured) return false;
                        } else {
                            if (map.tag !== tagFilter) return false;
                        }
                    }
                    // 搜索
                    if (searchTerm) {
                        var inTitle = map.title.toLowerCase().includes(searchTerm);
                        var inAuthor = map.author.toLowerCase().includes(searchTerm);
                        var inMinid = map.minid.toLowerCase().includes(searchTerm);
                        if (!inTitle && !inAuthor && !inMinid) return false;
                    }
                    return true;
                });

                // 按时间倒序
                filteredMaps.sort(function(a, b) {
                    return new Date(b.raw.created_at) - new Date(a.raw.created_at);
                });

                currentPage = 1;
                renderPage();
                renderPreview();
            }

            // ===== 加载数据 =====
            function loadMaps() {
                var grid = document.getElementById('mapGrid');
                grid.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载地图中...</div>';

                var REPO_OWNER = 'jgcgzs';
                var REPO_NAME = 'acns';
                var apiUrl = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';

                fetch(apiUrl)
                    .then(function(res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(function(issues) {
                        if (!issues || issues.length === 0) {
                            allMaps = [];
                            filteredMaps = [];
                            mapGrid.innerHTML = '<div class="empty-placeholder">暂无地图，在 GitHub Issues 中创建带 map 标签的文章</div>';
                            previewGrid.innerHTML = '<div class="preview-empty">暂无待发布地图</div>';
                            previewCount.textContent = '0';
                            return;
                        }
                        allMaps = issues.map(function(issue) {
                            return parseIssue(issue);
                        });
                        applyFilters();
                    })
                    .catch(function(err) {
                        console.warn('加载失败:', err);
                        mapGrid.innerHTML = '<div class="empty-placeholder"><i class="fas fa-exclamation-circle" style="display:block;font-size:24px;margin-bottom:8px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                        previewGrid.innerHTML = '<div class="preview-empty">加载失败</div>';
                        previewCount.textContent = '0';
                    });
            }

            // ===== 事件绑定 =====
            // 标签切换
            tagBar.addEventListener('click', function(e) {
                var target = e.target.closest('.tag-item');
                if (!target) return;
                document.querySelectorAll('.tag-item').forEach(function(el) {
                    el.classList.remove('active');
                });
                target.classList.add('active');
                applyFilters();
            });

            // 搜索
            searchBtn.addEventListener('click', function() {
                applyFilters();
            });
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    applyFilters();
                }
            });

            // 分页
            prevBtn.addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage();
                }
            });
            nextBtn.addEventListener('click', function() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPage();
                }
            });

            // ===== 初始化 =====
            loadMaps();

        })();
    </script>

</body>
</html>
