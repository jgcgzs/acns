<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>地图库 · 极光创工作室</title>
    <meta name="description" content="极光创工作室地图库 - 迷你世界地图作品展示" />
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- 公共组件样式 -->
    <link rel="stylesheet" href="../assets/css/components.css" />

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: #f0f6ff;
            color: #1a1a2e;
            line-height: 1.7;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== 蔚蓝 + 米哈游风格配色 ===== */
        :root {
            --blue-primary: #4a6cf7;
            --blue-primary-dark: #3651c7;
            --blue-primary-light: #6b8aff;
            --blue-deep: #1a2a6c;
            --blue-bg: #f0f6ff;
            --blue-card: #ffffff;
            --blue-border: #dce4f0;
            --blue-shadow: 0 4px 20px rgba(74, 108, 247, 0.12);
            --blue-shadow-hover: 0 10px 36px rgba(74, 108, 247, 0.22);
            --text-dark: #1a1a2e;
            --text-muted: #4a5568;
            --text-light: #7a8aa0;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            --gold: #f5a623;
        }

        /* ===== 导航栏（完全保留原样） ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--blue-border);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius-sm);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2.5px;
            background: var(--blue-primary);
            transition: width 0.3s ease;
            transform: translateX(-50%);
            border-radius: 4px;
        }
        .nav-links li a:hover {
            background: var(--blue-bg);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* ===== 底部 ===== */
        .footer {
            background: var(--blue-deep);
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.08);
        }

        /* ===== 页面头部 ===== */
        .page-header {
            padding: 18px 0 10px;
            border-bottom: 1px solid var(--blue-border);
            margin-bottom: 18px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header .sub {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
            margin-top: 2px;
        }

        /* ===== 搜索栏 ===== */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 180px;
            padding: 10px 18px;
            border: 2px solid var(--blue-border);
            border-radius: 50px;
            font-size: 14px;
            background: var(--blue-card);
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            box-shadow: 0 2px 8px rgba(74, 108, 247, 0.04);
        }
        .search-bar input:focus {
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.15);
        }
        .search-bar .search-btn {
            background: var(--blue-primary);
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.3);
        }
        .search-bar .search-btn:hover {
            background: var(--blue-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(74, 108, 247, 0.35);
        }
        .search-bar .search-btn:active {
            transform: scale(0.96);
        }

        /* ===== 分类栏（三行） ===== */
        .filter-section {
            margin-bottom: 4px;
        }
        .filter-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 6px;
            padding: 6px 0 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .filter-row::-webkit-scrollbar {
            height: 3px;
            background: var(--blue-border);
            border-radius: 4px;
        }
        .filter-row::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 4px;
        }
        .filter-label {
            flex: 0 0 auto;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.5px;
            padding: 4px 8px 4px 0;
            display: flex;
            align-items: center;
        }
        .filter-item {
            flex: 0 0 auto;
            padding: 5px 18px;
            border: 2px solid var(--blue-border);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--blue-card);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .filter-item:hover {
            border-color: var(--blue-primary-light);
            color: var(--blue-primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.15);
        }
        .filter-item.active {
            border-color: var(--blue-primary);
            color: #fff;
            background: var(--blue-primary);
            box-shadow: 0 4px 16px rgba(74, 108, 247, 0.3);
            transform: translateY(-1px);
        }
        .filter-item.active:hover {
            background: var(--blue-primary-dark);
            border-color: var(--blue-primary-dark);
        }

        /* ===== 预告栏 ===== */
        .preview-section {
            margin: 8px 0 24px;
        }
        .preview-section .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }
        .preview-section .preview-header h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .preview-section .preview-header h3 .badge-preview {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            background: var(--blue-primary);
            padding: 0 14px;
            border-radius: 50px;
            margin-left: 8px;
        }
        .preview-scroll {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 12px;
            margin: 0 -4px;
            scrollbar-width: thin;
        }
        .preview-scroll::-webkit-scrollbar {
            height: 4px;
            background: var(--blue-border);
            border-radius: 4px;
        }
        .preview-scroll::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 4px;
        }
        .preview-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            width: max-content;
            padding: 0 4px;
        }
        .preview-card {
            flex: 0 0 180px;
            max-width: 180px;
            background: var(--blue-card);
            border: 1px solid var(--blue-border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--blue-shadow);
            transition: box-shadow 0.4s, transform 0.4s;
            display: flex;
            flex-direction: column;
        }
        .preview-card:hover {
            box-shadow: var(--blue-shadow-hover);
            transform: translateY(-4px) scale(1.01);
        }
        .preview-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
        }
        .preview-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .preview-card .body {
            padding: 10px 12px 12px;
        }
        .preview-card .body .title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-card .body .meta {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .preview-empty {
            text-align: center;
            padding: 16px 0;
            color: var(--text-light);
            font-size: 14px;
            opacity: 0.5;
        }

        /* ===== 地图网格 ===== */
        .map-grid-container {
            margin-top: 4px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* ===== 地图卡片 ===== */
        .map-card {
            background: var(--blue-card);
            border: 1px solid var(--blue-border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--blue-shadow);
            transition: box-shadow 0.4s, transform 0.4s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .map-card:hover {
            box-shadow: var(--blue-shadow-hover);
            border-color: var(--blue-primary);
            transform: translateY(-5px);
        }
        .map-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            transition: transform 0.6s ease;
        }
        .map-card:hover .cover {
            transform: scale(1.02);
        }
        .map-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .map-card .body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .map-card .body .tag-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .map-card .body .tag-pill {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 12px;
            border-radius: 50px;
            letter-spacing: 0.3px;
            display: inline-block;
            line-height: 1.7;
            border: 1.5px solid transparent;
            background: rgba(74, 108, 247, 0.08);
            border-color: rgba(74, 108, 247, 0.25);
            color: var(--blue-primary);
        }
        .tag-pill.tag-gold {
            background: rgba(245, 166, 35, 0.10);
            border-color: rgba(245, 166, 35, 0.30);
            color: var(--gold);
        }
        .tag-pill.tag-platform {
            background: rgba(74, 108, 247, 0.08);
            border-color: rgba(74, 108, 247, 0.25);
            color: var(--blue-primary);
        }
        .tag-pill.tag-type {
            background: rgba(74, 108, 247, 0.08);
            border-color: rgba(74, 108, 247, 0.25);
            color: var(--blue-primary);
        }
        .tag-pill.tag-status {
            background: rgba(74, 108, 247, 0.08);
            border-color: rgba(74, 108, 247, 0.25);
            color: var(--blue-primary);
        }
        .map-card .body .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .map-card .body .date-row {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }
        .map-card .body .date-row i {
            font-size: 11px;
            opacity: 0.4;
        }
        .map-card .body .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
            flex-wrap: wrap;
            gap: 2px 8px;
            margin-top: 2px;
        }
        .map-card .body .meta-row .author {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--blue-primary);
            font-weight: 600;
            transition: color 0.2s;
        }
        .map-card .body .meta-row .author:hover {
            color: var(--blue-primary-dark);
            text-decoration: underline;
        }
        .map-card .body .meta-row .author i {
            font-size: 10px;
            opacity: 0.5;
        }
        .map-card .body .meta-row .minid {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
            color: var(--text-light);
            opacity: 0.6;
        }
        .map-card .body .desc-box {
            background: var(--blue-bg);
            border: 1px solid var(--blue-border);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 44px;
        }
        .map-card .body .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
            gap: 8px;
        }
        .map-card .body .btn-detail {
            padding: 4px 20px;
            border: none;
            border-radius: 50px;
            background: var(--blue-primary);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 2px 10px rgba(74, 108, 247, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .map-card .body .btn-detail:hover {
            background: var(--blue-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.35);
        }
        .map-card .body .btn-detail:active {
            transform: scale(0.94);
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 16px;
            border: 2px solid var(--blue-border);
            border-radius: 50px;
            background: var(--blue-card);
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 40px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.2);
        }
        .pagination button.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
            box-shadow: 0 4px 16px rgba(74, 108, 247, 0.3);
        }
        .pagination button:disabled {
            opacity: 0.25;
            cursor: default;
            transform: none !important;
            box-shadow: none !important;
        }
        .pagination .info {
            font-size: 13px;
            color: var(--text-light);
            padding: 0 12px;
            font-weight: 500;
        }

        /* ===== 加载 & 空状态 ===== */
        .loading-placeholder,
        .empty-placeholder {
            text-align: center;
            padding: 60px 0;
            color: var(--text-light);
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .loading-placeholder i {
            display: block;
            font-size: 32px;
            color: var(--blue-primary);
            margin-bottom: 12px;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
                   详情弹窗 - 模块化 + 左右入场 (新布局)
                   ============================================================ */
        .detail-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(26, 42, 108, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .detail-overlay.open {
            display: flex;
        }

        .detail-modal {
            position: relative;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            background: var(--blue-card);
            border-radius: var(--radius);
            box-shadow: 0 24px 64px rgba(26, 42, 108, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .detail-modal .detail-close {
            position: absolute;
            top: 14px;
            right: 18px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 22px;
            line-height: 1;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-modal .detail-close:hover {
            background: #fff;
            transform: rotate(90deg) scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
        }

        .detail-body {
            display: flex;
            flex-direction: row;
            overflow-y: auto;
            flex: 1;
            max-height: 90vh;
        }

        /* 左侧：封面 + 描述 (从左侧滑入) */
        .detail-left {
            flex: 0 0 42%;
            min-width: 200px;
            background: var(--blue-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 14px;
            animation: slideInLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            overflow-y: auto;
        }
        .detail-left .cover-wrap {
            flex: 0 0 auto;
            width: 100%;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            background: var(--blue-card);
        }
        .detail-left .cover-wrap img {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }
        .detail-left .cover-wrap .placeholder {
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--blue-primary);
            opacity: 0.2;
            background: var(--blue-card);
        }
        .detail-left .left-desc {
            background: var(--blue-card);
            border: 1px solid var(--blue-border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
            flex: 1;
            overflow-y: auto;
            max-height: 180px;
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-60px);

    <!-- ============================================================
    地图库主脚本
    ============================================================ -->
    <script>
        (function() {

            // ===== 移动端菜单 =====
            var toggle = document.getElementById('menuToggle');
            var navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ===== 工具函数 =====
            var parseDateFromBody = window.parseDateFromBody || function(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]),
                            month = parseInt(match[2]),
                            day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2,
                            '0');
                        }
                    }
                }
                return null;
            };

            var extractTitlePrefix = window.extractTitlePrefix || function(title) {
                var match = title.match(/^\[([^\]]+)\]\s*(.*)/);
                if (match) { return { prefix: match[1].trim(), cleanTitle: match[2].trim() || title }; }
                return null;
            };

            // ===== 解析地图 Issue =====
            function parseMapIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名地图';
                var body = issue.body || '';
                var author = '',
                    cover = '',
                    desc = '',
                    tag = '',
                    minid = '',
                    platform = '迷你世界',
                    type = '地图',
                    announcement = '';

                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    else if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '').trim();
                    else if (trimmed.match(/^描述[：:]\s*(.+)/)) desc = trimmed.replace(/^描述[：:]\s*/, '').trim();
                    else if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '').trim();
                    else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) minid = trimmed.replace(/^迷你号[：:]\s*/, '')
                    .trim();
                    else if (trimmed.match(/^平台[：:]\s*(.+)/)) {
                        var p = trimmed.replace(/^平台[：:]\s*/, '').trim();
                        if (p.indexOf('迷你') > -1) platform = '迷你世界';
                        else if (p.indexOf('我的世界') > -1 || p.indexOf('MC') > -1) platform = '我的世界';
                        else platform = p;
                    } else if (trimmed.match(/^类型[：:]\s*(.+)/)) {
                        var t = trimmed.replace(/^类型[：:]\s*/, '').trim();
                        if (t.indexOf('模组') > -1 || t.indexOf('模型') > -1) type = '模型/模组';
                        else if (t.indexOf('地图') > -1) type = '地图';
                        else type = t;
                    } else if (trimmed.match(/^公告[：:]\s*(.+)/)) {
                        announcement = trimmed.replace(/^公告[：:]\s*/, '').trim();
                    }
                });

                if (!author || author.trim() === '') author = '未知作者';
                if (!desc || desc.trim() === '') desc = '暂无描述';

                var dateStr = parseDateFromBody(body);
                if (!dateStr) dateStr = '未知';

                var prefixInfo = extractTitlePrefix(title);
                var displayTitle = title;
                if (prefixInfo) {
                    displayTitle = prefixInfo.cleanTitle;
                    tag = prefixInfo.prefix;
                }

                var isFeatured = /\[精选\]/.test(title) || tag === '精选';

                if (title.indexOf('迷你世界') > -1) platform = '迷你世界';
                else if (title.indexOf('我的世界') > -1 || title.indexOf('MC') > -1) platform = '我的世界';

                if (title.indexOf('模组') > -1 || title.indexOf('模型') > -1) type = '模型/模组';
                else if (title.indexOf('地图') > -1) type = '地图';

                return {
                    id: issue.number,
                    title: displayTitle,
                    author: author,
                    cover: cover,
                    desc: desc,
                    tag: tag || '',
                    minid: minid || '',
                    date: dateStr,
                    platform: platform,
                    type: type,
                    announcement: announcement || '暂无公告',
                    raw: issue,
                    isFeatured: isFeatured,
                    isGreenTag: !!prefixInfo
                };
            }

            // ===== 解析成员 Issue =====
            function parseMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [],
                    minid = '未知',
                    id = '未知',
                    joinDate = '未知',
                    avatar = '',
                    background = '',
                    bio = '',
                    pinnedMap = '',
                    pinnedBlog = '',
                    role = '';
                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    }
                });
                if (groups.length === 0 && (role === '室长' || role === '副室长')) groups = ['管理层'];
                if (bio) bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                return { name, role, groups, minid, id, joinDate, avatar, background, bio, pinnedMap, pinnedBlog };
            }

            // ===== 解析博客 =====
            function parseBlogIssue(issue) {
                var rawTitle = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名文章';
                var body = issue.body || '';
                var author = '',
                    category = '';
                var lines = body.split('\n');
                var contentStart = 0;
                lines.forEach(function(line, idx) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    else if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                        var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                        category = cats.split(/[,，、\s]+/)[0] || '未分类';
                    }
                    if (contentStart === 0 && trimmed && !trimmed.match(/^(作者|分类)[：:]/)) contentStart = idx;
                });
                if (!author) author = issue.user ? issue.user.login : '未知作者';
                if (!category) category = '未分类';
                var contentLines = lines.slice(contentStart);
                var contentText = contentLines.join(' ').replace(/[#*`>\[\]()]/g, ' ').replace(/\s+/g, ' ').trim();
                var summary = contentText.substring(0, 150) + (contentText.length > 150 ? '...' : '');
                var dateStr = '未知';
                var dateMatch = rawTitle.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (dateMatch) {
                    var y = parseInt(dateMatch[1]),
                        m = parseInt(dateMatch[2]),
                        d = parseInt(dateMatch[3]);
                    if (y >= 2000 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                        dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    }
                } else {
                    var d = new Date(issue.created_at);
                    dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate())
                        .padStart(2, '0');
                }
                var title = rawTitle.replace(/^\d{4}-\d{2}-\d{2}-/, '').trim() || rawTitle;
                return { id: issue.number, title, author, category, summary, date: dateStr };
            }

            // ============================================================
            // 状态
            // ============================================================
            var allMaps = [];
            var filteredMaps = [];
            var currentPage = 1;
            var pageSize = 16;
            var memberMinidMap = {};
            var allMembers = [];
            var allBlogs = [];

            var filterState = {
                platform: 'all',
                type: 'all',
                status: 'all'
            };

            var detailOpen = false;
            var currentDetailMap = null;
            var pendingDetailMap = null;
            var memberPollInterval = null;

            var mapGrid = document.getElementById('mapGrid');
            var previewGrid = document.getElementById('previewGrid');
            var previewCount = document.getElementById('previewCount');
            var searchInput = document.getElementById('searchInput');
            var searchBtn = document.getElementById('searchBtn');
            var prevBtn = document.getElementById('prevPage');
            var nextBtn = document.getElementById('nextPage');
            var pageInfo = document.getElementById('pageInfo');

            var detailOverlay = document.getElementById('detailOverlay');
            var detailClose = document.getElementById('detailClose');
            var detailCoverWrap = document.getElementById('detailCoverWrap');
            var detailLeftDesc = document.getElementById('detailLeftDesc');
            var detailTitle = document.getElementById('detailTitle');
            var detailTags = document.getElementById('detailTags');
            var detailMeta = document.getElementById('detailMeta');
            var detailExtra = document.getElementById('detailExtra');
            var detailAnnounce = document.getElementById('detailAnnounce');

            // ============================================================
            // 渲染
            // ============================================================
            function renderMapCard(map) {
                var coverHtml = (map.cover && map.cover.trim().startsWith('http')) ?
                    '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';

                var tagClass = map.isFeatured ? 'tag-gold' : 'tag-status';
                var tagHtml = map.tag ? '<span class="tag-pill ' + tagClass + '">' + map.tag + '</span>' : '';
                var platformHtml = '<span class="tag-pill tag-platform">' + map.platform + '</span>';
                var typeHtml = '<span class="tag-pill tag-type">' + map.type + '</span>';

                var finalMinid = (map.author && memberMinidMap[map.author]) ? memberMinidMap[map.author] : (map.minid ||
                '未知');
                var authorHtml = '<span class="author" data-author="' + map.author + '"><i class="fas fa-user"></i> ' + map
                    .author + '</span>';

                var html = '<div class="map-card" data-id="' + map.id + '">';
                html += coverHtml;
                html += '<div class="body">';
                html += '<div class="tag-row">' + platformHtml + typeHtml + tagHtml + '</div>';
                html += '<span class="title">' + map.title + '</span>';
                html += '<div class="date-row"><i class="fas fa-calendar-alt"></i> ' + map.date + '</div>';
                html += '<div class="meta-row">' + authorHtml + '<span class="minid">迷你号 ' + finalMinid + '</span></div>';
                html += '<div class="desc-box">' + map.desc + '</div>';
                html += '<div class="action-row"><button class="btn-detail" data-id="' + map.id +
                    '"><i class="fas fa-info-circle"></i> 详情</button></div>';
                html += '</div></div>';
                return html;
            }

            function renderPreviewCard(map) {
                var coverHtml = (map.cover && map.cover.trim().startsWith('http')) ?
                    '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';
                return '<div class="preview-card">' + coverHtml +
                    '<div class="body"><div class="title">' + map.title + '</div><div class="meta">' + map.author +
                    ' · ' + map.date + '</div></div></div>';
            }

            function renderPage() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * pageSize;
                var end = Math.min(start + pageSize, total);
                var pageItems = filteredMaps.slice(start, end);

                if (pageItems.length === 0) {
                    mapGrid.innerHTML = '<div class="empty-placeholder">没有匹配的地图</div>';
                } else {
                    var html = '';
                    pageItems.forEach(function(map) { html += renderMapCard(map); });
                    mapGrid.innerHTML = html;
                }

                pageInfo.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;

                mapGrid.querySelectorAll('.btn-detail').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = parseInt(this.dataset.id);
                        var map = allMaps.find(function(m) { return m.id === id; });
                        if (map) openDetail(map);
                    });
                });

                mapGrid.querySelectorAll('.author').forEach(function(el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var authorName = this.dataset.author;
                        if (detailOpen) {
                            pendingDetailMap = currentDetailMap;
                            closeDetail(false);
                            setTimeout(function() {
                                openMemberArchive(authorName);
                            }, 150);
                        } else {
                            openMemberArchive(authorName);
                        }
                    });
                });
            }

            function renderPreview() {
                var previewMaps = allMaps.filter(function(m) { return m.tag === '待发布'; });
                previewCount.textContent = previewMaps.length;
                if (previewMaps.length === 0) {
                    previewGrid.innerHTML = '<div class="preview-empty">暂无待发布地图</div>';
                    return;
                }
                var html = '';
                previewMaps.forEach(function(map) { html += renderPreviewCard(map); });
                previewGrid.innerHTML = html;
            }

            // ============================================================
            // 详情弹窗 - 新布局
            // ============================================================
            function openDetail(map) {
                if (!map) return;
                currentDetailMap = map;
                detailOpen = true;

                // 左侧封面
                if (map.cover && map.cover.trim().startsWith('http')) {
                    detailCoverWrap.innerHTML = '<img src="' + map.cover.trim() + '" alt="' + map.title +
                        '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=\\\'placeholder\\\'><i class=\\\'fas fa-image\\\'></i></div>\'">';
                } else {
                    detailCoverWrap.innerHTML = '<div class="placeholder"><i class="fas fa-image"></i></div>';
                }

                // 左侧描述
                detailLeftDesc.textContent = map.desc || '暂无描述';

                // 右侧标题
                detailTitle.textContent = map.title;

                // 标签
                var tagClass = map.isFeatured ? 'gold' : '';
                var tagsHtml = '';
                tagsHtml += '<span class="tag-pill tag-platform">' + map.platform + '</span>';
                tagsHtml += '<span class="tag-pill tag-type">' + map.type + '</span>';
                if (map.tag) tagsHtml += '<span class="tag-pill ' + tagClass + '">' + map.tag + '</span>';
                detailTags.innerHTML = tagsHtml;

                // 元数据：作者、迷你号、日期
                var finalMinid = (map.author && memberMinidMap[map.author]) ? memberMinidMap[map.author] : (map.minid ||
                    '未知');
                var metaHtml = '';
                metaHtml += '<span><i class="fas fa-user"></i> <span class="d-author" data-author="' + map.author +
                    '">' + map.author + '</span></span>';
                metaHtml += '<span><i class="fas fa-hashtag"></i> 迷你号 ' + finalMinid + '</span>';
                metaHtml += '<span><i class="fas fa-calendar-alt"></i> ' + map.date + '</span>';
                detailMeta.innerHTML = metaHtml;

                // 绑定作者点击
                detailMeta.querySelector('.d-author').addEventListener('click', function() {
                    var name = this.dataset.author;
                    if (detailOpen) {
                        pendingDetailMap = currentDetailMap;
                        closeDetail(false);
                        setTimeout(function() {
                            openMemberArchive(name);
                        }, 150);
                    } else {
                        openMemberArchive(name);
                    }
                });

                // 扩展信息：平台、类型、状态（去掉结束和编号）
                var extraHtml = '';
                extraHtml += '<div class="extra-item"><strong>平台</strong> ' + map.platform + '</div>';
                extraHtml += '<div class="extra-item"><strong>类型</strong> ' + map.type + '</div>';
                extraHtml += '<div class="extra-item"><strong>状态</strong> <span class="badge ' + (map.isFeatured ?
                    'gold' : '') + '">' + (map.tag || '未知') + '</span></div>';
                detailExtra.innerHTML = extraHtml;

                // 公告
                detailAnnounce.textContent = '📢 ' + (map.announcement || '暂无公告');

                // 重置动画
                var left = document.querySelector('.detail-left');
                var right = document.querySelector('.detail-right');
                left.style.animation = 'none';
                right.querySelectorAll('.mod').forEach(function(el) { el.style.animation = 'none'; });
                void left.offsetHeight;
                left.style.animation = '';
                right.querySelectorAll('.mod').forEach(function(el) { el.style.animation = ''; });

                detailOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeDetail(restore) {
                detailOverlay.classList.remove('open');
                document.body.style.overflow = '';
                detailOpen = false;
                if (restore && pendingDetailMap) {
                    var map = pendingDetailMap;
                    pendingDetailMap = null;
                    setTimeout(function() {
                        openDetail(map);
                    }, 200);
                } else {
                    pendingDetailMap = null;
                }
            }

            detailClose.addEventListener('click', function() {
                pendingDetailMap = null;
                closeDetail(false);
            });
            detailOverlay.addEventListener('click', function(e) {
                if (e.target === detailOverlay) {
                    pendingDetailMap = null;
                    closeDetail(false);
                }
            });

            // ============================================================
            // 成员档案联动
            // ============================================================
            function openMemberArchive(name) {
                if (typeof window.openMemberModal === 'function') {
                    var wasDetailOpen = detailOpen;
                    var detailMap = currentDetailMap;
                    if (wasDetailOpen) {
                        pendingDetailMap = detailMap;
                        closeDetail(false);
                    }
                    window.openMemberModal(name);
                    if (memberPollInterval) clearInterval(memberPollInterval);
                    memberPollInterval = setInterval(function() {
                        var overlay = document.getElementById('modalOverlay');
                        if (!overlay || overlay.style.display === 'none' || overlay.style.display === '') {
                            clearInterval(memberPollInterval);
                            memberPollInterval = null;
                            if (pendingDetailMap) {
                                var map = pendingDetailMap;
                                pendingDetailMap = null;
                                setTimeout(function() {
                                    openDetail(map);
                                }, 180);
                            }
                        }
                    }, 300);
                } else {
                    alert('成员档案功能未加载，请检查 assets/js/components.js');
                }
            }

            document.addEventListener('click', function(e) {
                var closeBtn = document.getElementById('modalClose');
                if (closeBtn && (e.target === closeBtn || e.target.closest('.modal-close'))) {
                    setTimeout(function() {
                        if (pendingDetailMap) {
                            var map = pendingDetailMap;
                            pendingDetailMap = null;
                            openDetail(map);
                        }
                    }, 200);
                }
            });

            // ============================================================
            // 筛选
            // ============================================================
            function applyFilters() {
                var searchTerm = searchInput.value.trim().toLowerCase();
                var pf = filterState.platform;
                var tp = filterState.type;
                var st = filterState.status;

                filteredMaps = allMaps.filter(function(map) {
                    if (pf !== 'all' && map.platform !== pf) return false;
                    if (tp !== 'all' && map.type !== tp) return false;
                    if (st !== 'all') {
                        if (st === '精选') {
                            if (!map.isFeatured) return false;
                        } else {
                            if (map.tag !== st) return false;
                        }
                    }
                    if (searchTerm) {
                        var inTitle = map.title.toLowerCase().includes(searchTerm);
                        var inAuthor = map.author.toLowerCase().includes(searchTerm);
                        var finalMinid = (map.author && memberMinidMap[map.author]) ? memberMinidMap[map.author] : (map
                            .minid || '未知');
                        var inMinid = finalMinid.includes(searchTerm);
                        if (!inTitle && !inAuthor && !inMinid) return false;
                    }
                    return true;
                });

                filteredMaps.sort(function(a, b) {
                    if (a.date === '未知' && b.date === '未知') return 0;
                    if (a.date === '未知') return 1;
                    if (b.date === '未知') return -1;
                    return b.date.localeCompare(a.date);
                });

                currentPage = 1;
                renderPage();
                renderPreview();
            }

            // ============================================================
            // 分类栏事件
            // ============================================================
            document.querySelectorAll('.filter-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    var filter = this.dataset.filter;
                    var value = this.dataset.value;
                    if (!filter) return;
                    filterState[filter] = value;
                    var row = this.closest('.filter-row');
                    if (row) {
                        row.querySelectorAll('.filter-item').forEach(function(el) {
                            if (el.dataset.filter === filter) {
                                el.classList.toggle('active', el.dataset.value === value);
                            }
                        });
                    }
                    applyFilters();
                });
            });

            // ============================================================
            // 搜索 & 分页
            // ============================================================
            searchBtn.addEventListener('click', applyFilters);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') applyFilters();
            });

            prevBtn.addEventListener('click', function() {
                if (currentPage > 1) { currentPage--;
                    renderPage(); }
            });
            nextBtn.addEventListener('click', function() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize);
                if (currentPage < totalPages) { currentPage++;
                    renderPage(); }
            });

            // ============================================================
            // 加载数据
            // ============================================================
            function loadData() {
                mapGrid.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载地图中...</div>';

                var REPO_OWNER = 'jgcgzs',
                    REPO_NAME = 'acns';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var blogApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=blog&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(blogApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var mapIssues = results[0] || [],
                        memberIssues = results[1] || [],
                        blogIssues = results[2] || [];

                    allMaps = mapIssues.map(function(i) { return parseMapIssue(i); });

                    if (memberIssues.length) {
                        allMembers = memberIssues.map(function(i) { return parseMemberIssue(i); });
                        allMembers = allMembers.filter(function(m) {
                            if (m.groups && m.groups.length) return true;
                            if (m.role === '室长' || m.role === '副室长') return true;
                            return false;
                        });
                        memberMinidMap = {};
                        allMembers.forEach(function(m) {
                            if (m.name && m.minid) memberMinidMap[m.name] = m.minid;
                        });
                    } else {
                        allMembers = [];
                        memberMinidMap = {};
                    }

                    allBlogs = blogIssues.map(function(i) { return parseBlogIssue(i); });

                    window._memberData = allMembers;
                    window._mapData = allMaps;
                    window._blogData = allBlogs;

                    filterState = { platform: 'all', type: 'all', status: 'all' };
                    document.querySelectorAll('.filter-item').forEach(function(el) {
                        var f = el.dataset.filter;
                        var v = el.dataset.value;
                        if (f && v === 'all') el.classList.add('active');
                        else el.classList.remove('active');
                    });

                    applyFilters();
                }).catch(function(err) {
                    console.warn('加载失败:', err);
                    mapGrid.innerHTML =
                        '<div class="empty-placeholder"><i class="fas fa-exclamation-circle" style="display:block;font-size:24px;margin-bottom:8px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                    previewGrid.innerHTML = '<div class="preview-empty">加载失败</div>';
                    previewCount.textContent = '0';
                });
            }

            loadData();

        })();
    </script>

</body>
</html>
