            padding: 0;

        }

            color: #1a1a2e;

        /* ===== 蔚蓝 + 米哈游风格配色 ===== */

            --blue-primary-dark: #3651c7;
            --blue-primary-light: #6b8aff;
            --blue-deep: #1a2a6c;
            --blue-bg: #f0f6ff;
            --blue-card: #ffffff;
            --blue-border: #dce4f0;
            --blue-shadow: 0 4px 20px rgba(74, 108, 247, 0.12);
            --blue-shadow-hover: 0 10px 36px rgba(74, 108, 247, 0.22);
            --text-dark: #1a1a2e;
            --text-muted: #4a5568;
            --text-light: #7a8aa0;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            --gold: #f5a623;
        }

        /* ===== 导航栏（完全保留原样） ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--blue-border);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius-sm);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2.5px;
            background: var(--blue-primary);
            transition: width 0.3s ease;
            transform: translateX(-50%);
            border-radius: 4px;
        }
        .nav-links li a:hover {
            background: var(--blue-bg);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* ===== 底部 ===== */
        .footer {
            background: var(--blue-deep);
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.08);
        }

        /* ===== 页面头部 ===== */
        .page-header {
            padding: 18px 0 10px;
            border-bottom: 1px solid var(--blue-border);
            margin-bottom: 18px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header .sub {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
            margin-top: 2px;
        }

        /* ===== 搜索栏 ===== */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 180px;
            padding: 10px 18px;
            border: 2px solid var(--blue-border);
            border-radius: 50px;
            font-size: 14px;
            background: var(--blue-card);
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            box-shadow: 0 2px 8px rgba(74, 108, 247, 0.04);
        }
        .search-bar input:focus {
            border-color: var(--blue-primary);
            box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.15);
        }
        .search-bar .search-btn {
            background: var(--blue-primary);
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 14px rgba(74, 108, 247, 0.3);
        }
        .search-bar .search-btn:hover {
            background: var(--blue-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(74, 108, 247, 0.35);
        }
        .search-bar .search-btn:active {
            transform: scale(0.96);
        }

        /* ===== 分类栏（三行） ===== */
        .filter-section {
            margin-bottom: 4px;
        }
        .filter-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 6px;
            padding: 6px 0 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .filter-row::-webkit-scrollbar {
            height: 3px;
            background: var(--blue-border);
            border-radius: 4px;
        }
        .filter-row::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 4px;
        }
        .filter-label {
            flex: 0 0 auto;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.5px;
            padding: 4px 8px 4px 0;
            display: flex;
            align-items: center;
        }
        .filter-item {
            flex: 0 0 auto;
            padding: 5px 18px;
            border: 2px solid var(--blue-border);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;

        .filter-item:hover {

        }
        .filter-item.active {
            border-color: var(--blue-primary);
            color: #fff;
            background: var(--blue-primary);
            box-shadow: 0 4px 16px rgba(74, 108, 247, 0.3);
            transform: translateY(-1px);
        }
        .filter-item.active:hover {
            background: var(--blue-primary-dark);
            border-color: var(--blue-primary-dark);
        }

        .preview-scroll::-webkit-scrollbar {

        }
        .preview-scroll::-webkit-scrollbar-thumb {

            border-radius: 4px;
        }
        .preview-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            width: max-content;
            padding: 0 4px;
        }
        .preview-card {
            flex: 0 0 180px;
            max-width: 180px;
            background: var(--blue-card);

            border-radius: var(--radius);

            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
        }
        .preview-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--blue-primary);
            opacity: 0.2;

        .preview-card .body {

        .preview-card .body .title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-card .body .meta {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .preview-empty {
            text-align: center;
            padding: 16px 0;
            color: var(--text-light);
            font-size: 14px;
            opacity: 0.5;
        }

        /* ===== 地图网格 ===== */
        .map-grid-container {
            margin-top: 4px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* ===== 地图卡片 ===== */
        .map-card {
            background: var(--blue-card);
            border: 1px solid var(--blue-border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--blue-shadow);
            transition: box-shadow 0.4s, transform 0.4s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .map-card:hover {
            box-shadow: var(--blue-shadow-hover);
            border-color: var(--blue-primary);
            transform: translateY(-5px);
        }
        .map-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            transition: transform 0.6s ease;
        }
        .map-card:hover .cover {
            transform: scale(1.02);

        .map-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg);
            border-bottom: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            color: var(--blue-primary);
            opacity: 0.2;

        .map-card .body {

            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .map-card .body .tag-row {

            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }

            letter-spacing: 0.3px;

            line-height: 1.7;
            border: 1.5px solid transparent;
            background: rgba(74, 108, 247, 0.08);
            border-color: rgba(74, 108, 247, 0.25);
            color: var(--blue-primary);

        .map-card .body .title {

            -webkit-line-clamp: 2;

        .map-card .body .meta-row {

            flex-wrap: wrap;

        .map-card .body .meta-row .author {

        }
        .map-card .body .meta-row .author:hover {
            color: var(--blue-primary-dark);

        }
        .map-card .body .meta-row .author i {

            opacity: 0.5;

        .map-card .body .action-row {
            display: flex;
            justify-content: flex-end;

        }
        .map-card .body .btn-detail {
            padding: 4px 20px;
            border: none;
            border-radius: 50px;
            background: var(--blue-primary);

        }
        .map-card .body .btn-detail:hover {
            background: var(--blue-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.35);
        }
        .map-card .body .btn-detail:active {
            transform: scale(0.94);
        }

            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--blue-pale);
            padding: 0 14px;
            transition: background 0.2s;
        }
        .filter-bar .search-wrap:focus-within {
            background: #e4edff;
        }
        .filter-bar .search-wrap i {
            color: var(--text-secondary);
            opacity: 0.4;
            font-size: 14px;
        }
        .filter-bar .search-wrap input {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
        }
        .filter-bar .search-wrap input::placeholder {
            color: var(--text-secondary);
            opacity: 0.4;
        }

        .filter-bar .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .filter-bar .filter-group .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-right: 4px;
        }
        .filter-tag {
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--blue-pale);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .filter-tag:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .filter-tag.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
            box-shadow: 0 2px 8px rgba(95, 127, 255, 0.2);
        }

        /* ===== 分类标签（地图/模型/模组） ===== */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 0;
        }
        .category-tag {
            padding: 6px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--white);
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }
        .category-tag:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .category-tag.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
            box-shadow: 0 2px 8px rgba(95, 127, 255, 0.2);
        }
        .category-tag i {
            margin-right: 6px;
            font-size: 13px;
        }

        /* ===== 状态筛选标签（新增） ===== */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            padding: 6px 0;
            border-top: 1px solid var(--border-light);
            padding-top: 12px;
        }
        .status-bar .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-right: 8px;
            align-self: center;
        }
        .status-tag {
            padding: 4px 14px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--blue-pale);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .status-tag:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .status-tag.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
            box-shadow: 0 2px 8px rgba(95, 127, 255, 0.2);
        }

        /* ===== 卡片网格 ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 4px;
        }

        /* ===== 卡片样式 — 直角 · 简洁入场 ===== */
        .work-card {
            background: var(--white);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeIn 0.5s ease forwards;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .work-card:nth-child(1) { animation-delay: 0.04s; }
        .work-card:nth-child(2) { animation-delay: 0.08s; }
        .work-card:nth-child(3) { animation-delay: 0.12s; }
        .work-card:nth-child(4) { animation-delay: 0.16s; }
        .work-card:nth-child(5) { animation-delay: 0.20s; }
        .work-card:nth-child(6) { animation-delay: 0.24s; }
        .work-card:nth-child(7) { animation-delay: 0.28s; }
        .work-card:nth-child(8) { animation-delay: 0.32s; }
        .work-card:nth-child(9) { animation-delay: 0.36s; }
        .work-card:nth-child(10) { animation-delay: 0.40s; }
        .work-card:nth-child(11) { animation-delay: 0.44s; }
        .work-card:nth-child(12) { animation-delay: 0.48s; }
        .work-card:nth-child(13) { animation-delay: 0.52s; }
        .work-card:nth-child(14) { animation-delay: 0.56s; }
        .work-card:nth-child(15) { animation-delay: 0.60s; }
        .work-card:nth-child(16) { animation-delay: 0.64s; }

        @keyframes cardFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .work-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--blue-primary);
        }

        .work-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-pale);
            transition: transform 0.4s ease;
        }
        .work-card:hover .cover {
            transform: scale(1.02);
        }
        .work-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--blue-primary);
            opacity: 0.15;
            transition: opacity 0.3s;
        }
        .work-card:hover .cover-placeholder {
            opacity: 0.25;
        }

        /* 状态徽章（右上角）保留 */
        .work-card .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 12px;
            color: #fff;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.35);
            z-index: 2;
        }
        .work-card .status-badge.planning { background: #94a3b8; }
        .work-card .status-badge.developing { background: #f59e0b; }
        .work-card .status-badge.testing { background: #8b5cf6; }
        .work-card .status-badge.updating { background: #3b82f6; }
        .work-card .status-badge.pending { background: #14b8a6; }
        .work-card .status-badge.completed { background: #16a34a; }

        /* 卡片正文 — 类型标签移到标题上方 */
        .work-card .body {
            padding: 14px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .work-card .body .type-label {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            background: var(--blue-primary);
            display: inline-block;
            padding: 2px 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
            align-self: flex-start;
        }
        .work-card .body .type-label.mc {
            background: #2d3436;
        }

        .work-card .body .title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .work-card .body .author {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .work-card .body .author i {
            font-size: 11px;
            opacity: 0.5;
        }
        .work-card .body .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-top: 2px;
        }
        .work-card .body .meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .work-card .body .meta i {
            font-size: 11px;
            opacity: 0.4;
        }

        .work-card .body .desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 4px;
            opacity: 0.8;
        }

        .work-card .body .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-light);
        }
        .work-card .body .footer-row .tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 12px;
            color: var(--blue-primary);
            background: var(--blue-pale);
            border: 1px solid var(--border-light);
            letter-spacing: 0.2px;
        }
        .work-card .body .footer-row .view-btn {
            font-size: 12px;
            font-weight: 600;
            color: var(--blue-primary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: gap 0.3s;
            border: none;
            background: none;
            cursor: pointer;
        }
        .work-card:hover .body .footer-row .view-btn {
            gap: 8px;
        }
        .work-card .body .footer-row .view-btn i {
            font-size: 11px;
            transition: transform 0.3s;
        }
        .work-card:hover .body .footer-row .view-btn i {
            transform: translateX(4px);
        }

        /* ===== 空状态 & 加载 ===== */
        .empty-state,
        .loading-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-secondary);
            opacity: 0.4;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .loading-state i {
            display: block;
            font-size: 32px;
            color: var(--blue-primary);
            margin-bottom: 12px;
            opacity: 0.6;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 16px;
            border: 1px solid var(--border-light);
            background: var(--white);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 36px;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .pagination button.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination .info {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.5;
            padding: 0 8px;
        }

        /* ============================================================
           详情弹窗 — 直角 · 简洁 · 淡入入场
           ============================================================ */
        .detail-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 300;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: overlayFade 0.3s ease;
        }
        .detail-modal-overlay.active {
            display: flex;
        }
        @keyframes overlayFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .detail-modal {
            background: #ffffff;
            max-width: 920px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: modalIn 0.3s ease;
            border: 1px solid var(--border-light);
        }
        .detail-modal.has-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .detail-modal.has-bg .detail-inner {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 28px 32px 32px;
        }
        .detail-modal .detail-inner {
            padding: 28px 32px 32px;
        }

        @keyframes modalIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 关闭按钮 */
        .detail-modal .modal-close {
            position: sticky;
            top: 6px;
            float: right;
            font-size: 24px;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            z-index: 10;
            line-height: 1;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        .detail-modal .modal-close:hover {
            color: var(--text-primary);
            background: #ffffff;
            border-color: var(--blue-primary);
        }

        /* 弹窗主体网格 */
        .detail-modal .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 28px;
            margin-top: 0;
        }
        .detail-modal .detail-grid > * {
            opacity: 0;
            animation: gridFadeIn 0.4s ease forwards;
        }
        .detail-modal .detail-grid .detail-left {
            animation-delay: 0.06s;
        }
        .detail-modal .detail-grid .detail-right {
            animation-delay: 0.12s;
        }
        @keyframes gridFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 左侧 */
        .detail-modal .detail-left {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .detail-modal .detail-cover {
            overflow: hidden;
            background: var(--blue-pale);
            border: 1px solid var(--border-light);
            position: relative;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-modal .detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-modal .detail-cover .cover-placeholder {
            font-size: 4rem;
            color: var(--blue-primary);
            opacity: 0.15;
        }
        /* 移除封面上的类型标签 */

        .detail-modal .info-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }
        .detail-modal .info-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 14px;
            gap: 8px;
        }
        .detail-modal .info-card .row:last-child {
            border-bottom: none;
        }
        .detail-modal .info-card .label {
            font-weight: 600;
            color: var(--text-secondary);
            opacity: 0.6;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .detail-modal .info-card .value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            word-break: break-all;
            max-width: 65%;
            font-size: 13px;
        }
        .detail-modal .info-card .value a {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .detail-modal .info-card .value a:hover {
            text-decoration: underline;
        }
        .detail-modal .info-card .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--blue-primary);
            background: var(--blue-pale);
            border: 1px solid var(--border-light);
            padding: 1px 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 4px;
            font-family: inherit;
            white-space: nowrap;
        }
        .detail-modal .info-card .copy-btn:hover {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
        }
        .detail-modal .info-card .copy-btn i {
            font-size: 10px;
        }
        .detail-modal .info-card .value .copy-btn {
            display: inline-flex;
        }

        /* 右侧 — 类型标签放在标题上方 */
        .detail-modal .detail-right {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .detail-modal .detail-right .type-label {
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: var(--blue-primary);
            display: inline-block;
            padding: 2px 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            align-self: flex-start;
        }
        .detail-modal .detail-right .type-label.mc {
            background: #2d3436;
        }
        .detail-modal .detail-right .title-section h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: 2px;
        }
        .detail-modal .detail-right .title-section .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.5;
            font-weight: 500;
        }

        .detail-modal .status-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 24px;
            padding: 12px 18px;
            background: var(--blue-pale);
            border: 1px solid var(--border-light);
        }
        .detail-modal .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-primary);
        }
        .detail-modal .status-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .detail-modal .status-item .dot.planning { background: #94a3b8; }
        .detail-modal .status-item .dot.developing { background: #f59e0b; }
        .detail-modal .status-item .dot.testing { background: #8b5cf6; }
        .detail-modal .status-item .dot.updating { background: #3b82f6; }
        .detail-modal .status-item .dot.pending { background: #14b8a6; }
        .detail-modal .status-item .dot.completed { background: #16a34a; }
        .detail-modal .status-item .label {
            font-weight: 500;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .detail-modal .status-item .value {
            font-weight: 600;
        }

        .detail-modal .progress-section {
            background: var(--white);
            border: 1px solid var(--border-light);
            padding: 14px 18px;
            box-shadow: var(--shadow-sm);
        }
        .detail-modal .progress-section .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .detail-modal .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: var(--blue-pale);
            overflow: hidden;
        }
        .detail-modal .progress-bar-fill {
            height: 100%;
            background: var(--blue-primary);
            transition: width 0.8s ease;
            width: 0%;
        }

        .detail-modal .desc-section {
            background: var(--white);
            border: 1px solid var(--border-light);
            padding: 16px 18px;
            box-shadow: var(--shadow-sm);
            font-size: 14px;
            line-height: 1.9;
            color: var(--text-primary);
        }
        .detail-modal .desc-section p {
            margin-bottom: 8px;
        }
        .detail-modal .desc-section p:last-child {
            margin-bottom: 0;
        }

        .detail-modal .announcement {
            background: var(--blue-pale);
            border-left: 4px solid var(--blue-primary);
            padding: 12px 18px;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.7;
        }
        .detail-modal .announcement .announce-label {
            font-weight: 700;
            color: var(--blue-primary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        /* ===== 复制 Toast ===== */
        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 24px;
            font-size: 14px;
            z-index: 500;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================================
           响应式
           ============================================================ */
        @media (max-width: 992px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 14px 16px;
            }
            .filter-bar .search-wrap {
                min-width: auto;
            }
            .filter-bar .filter-group {
                justify-content: flex-start;
            }
        }
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }

    <!-- 引入公共脚本 -->
    <script src="../assets/js/components.js"></script>

    <script>
        (function() {

            // ============================================================
            // 移动端菜单（不变）
            // ============================================================
            const toggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ============================================================
            // 解析工具（不变）
            // ============================================================
            function parseDateFromBody(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]),
                            month = parseInt(match[2]),
                            day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        }
                    }
                }
                return null;
            }

            function extractTitlePrefix(title) {
                var match = title.match(/^\[([^\]]+)\]\s*(.*)/);
                if (match) { return { prefix: match[1].trim(), cleanTitle: match[2].trim() || title }; }
                return null;
            }

            // ============================================================
            // 解析成员迷你号（不变）
            // ============================================================
            function parseMemberMinid(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var minid = '';
                var name = title.split('-')[0].trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim();
                    }
                });
                return { name: name, minid: minid };
            }

            // ============================================================
            // 解析作品Issue（不变）
            // ============================================================
            function parseWorkIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名作品';
                var body = issue.body || '';
                var author = '',
                    cover = '',
                    desc = '',
                    tag = '',
                    minid = '',
                    type = '',
                    status = '',
                    progress = '',
                    announcement = '',
                    download = '',
                    workId = '';

                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    else if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '').trim();
                    else if (trimmed.match(/^描述[：:]\s*(.+)/)) desc = trimmed.replace(/^描述[：:]\s*/, '').trim();
                    else if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '').trim();
                    else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim();
                    else if (trimmed.match(/^类型[：:]\s*(.+)/)) type = trimmed.replace(/^类型[：:]\s*/, '').trim();
                    else if (trimmed.match(/^状态[：:]\s*(.+)/)) status = trimmed.replace(/^状态[：:]\s*/, '').trim();
                    else if (trimmed.match(/^进度[：:]\s*(.+)/)) progress = trimmed.replace(/^进度[：:]\s*/, '').trim();
                    else if (trimmed.match(/^公告[：:]\s*(.+)/)) announcement = trimmed.replace(/^公告[：:]\s*/, '').trim();
                    else if (trimmed.match(/^下载[：:]\s*(.+)/)) download = trimmed.replace(/^下载[：:]\s*/, '').trim();
                    else if (trimmed.match(/^作品ID[：:]\s*(.+)/)) workId = trimmed.replace(/^作品ID[：:]\s*/, '').trim();
                });

                if (!author) author = '未知作者';
                if (!desc) desc = '暂无描述';

                var dateStr = parseDateFromBody(body);
                if (!dateStr) dateStr = '未知';

                var prefixInfo = extractTitlePrefix(title);
                var displayTitle = title;
                if (prefixInfo) {
                    displayTitle = prefixInfo.cleanTitle;
                    if (!tag) tag = prefixInfo.prefix;
                }

                var isFeatured = /\[精选\]/.test(title) || tag === '精选';

                // 判断分类
                var category = '地图';
                if (tag) {
                    var lowerTag = tag.toLowerCase();
                    if (lowerTag.includes('模型') || lowerTag.includes('model')) category = '模型';
                    else if (lowerTag.includes('模组') || lowerTag.includes('mod')) category = '模组';
                    else if (lowerTag.includes('地图') || lowerTag.includes('map')) category = '地图';
                }

                return {
                    id: issue.number,
                    title: displayTitle,
                    author: author,
                    cover: cover,
                    desc: desc,
                    tag: tag || '',
                    minid: minid || '',
                    type: type || '迷你世界',
                    status: status || '',
                    progress: progress || '',
                    announcement: announcement || '',
                    download: download || '',
                    workId: workId || '',
                    date: dateStr,
                    raw: issue,
                    isFeatured: isFeatured,
                    category: category
                };
            }

            // ============================================================
            // 复制功能（不变）
            // ============================================================
            function copyText(text, label) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(function() {
                        showToast(label + ' 已复制');
                    }).catch(function() {
                        fallbackCopy(text, label);
                    });
                } else {
                    fallbackCopy(text, label);
                }
            }

            function fallbackCopy(text, label) {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast(label + ' 已复制');
                } catch (e) {
                    showToast('复制失败，请手动复制');
                }
                document.body.removeChild(textarea);
            }

            function showToast(msg) {
                var existing = document.querySelector('.copy-toast');
                if (existing) existing.remove();
                var toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(function() { toast.remove(); }, 2000);
            }

            window.copyText = copyText;

            // ============================================================
            // 状态
            // ============================================================
            var allWorks = [];
            var filteredWorks = [];
            var currentPage = 1;
            var pageSize = 16;
            var memberMinidMap = {};
            var allMembers = [];

            var cardGrid = document.getElementById('cardGrid');
            var searchInput = document.getElementById('searchInput');
            var categoryBar = document.getElementById('categoryBar');
            var statusBar = document.getElementById('statusBar');
            var prevBtn = document.getElementById('prevPage');
            var nextBtn = document.getElementById('nextPage');
            var pageInfo = document.getElementById('pageInfo');

            // 详情弹窗
            var detailModal = document.getElementById('detailModal');
            var detailContent = document.getElementById('detailModalContent');
            var detailInner = document.getElementById('detailModalInner');
            var detailBody = document.getElementById('detailBody');
            var detailClose = document.getElementById('detailModalClose');

            // 公共弹窗
            var modalOverlay = document.getElementById('modalOverlay');
            var modalContent = document.getElementById('modalContent');
            var modalInner = document.getElementById('modalInner');
            var modalClose = document.getElementById('modalClose');

            // ============================================================
            // 渲染卡片（类型标签移到标题上方）
            // ============================================================
            function renderCard(work) {
                var coverHtml = (work.cover && work.cover.trim().startsWith('http')) ?
                    '<img class="cover" src="' + work.cover.trim() + '" alt="' + work.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';

                var typeLabel = work.type || '迷你世界';
                var isMC = (typeLabel.toLowerCase().includes('minecraft') || typeLabel.toLowerCase().includes('mc'));
                var typeClass = isMC ? 'mc' : '';

                var statusMap = {
                    '策划中': 'planning',
                    '开发中': 'developing',
                    '测试中': 'testing',
                    '更新中': 'updating',
                    '待发布': 'pending',
                    '已完结': 'completed',
                    '已完善': 'completed'
                };
                var statusDot = statusMap[work.status] || 'planning';

                var finalMinid = (work.author && memberMinidMap[work.author]) ? memberMinidMap[work.author] : (work.minid ||
                    '未录入');

                var html = '<div class="work-card" data-id="' + work.id + '" onclick="openDetail(' + work.id + ')">';
                // 状态徽章（右上角）
                if (work.status) {
                    html += '<span class="status-badge ' + statusDot + '">' + work.status + '</span>';
                }
                html += coverHtml;
                html += '<div class="body">';
                // 类型标签（左上角移到标题上方）
                html += '<span class="type-label ' + typeClass + '">' + typeLabel + '</span>';
                html += '<div class="title">' + work.title + '</div>';
                html += '<div class="author"><i class="fas fa-user"></i> ' + work.author + '</div>';
                html += '<div class="meta"><span><i class="fas fa-calendar-alt"></i> ' + work.date +
                    '</span><span><i class="fas fa-hashtag"></i> ' + finalMinid + '</span></div>';
                if (work.desc && work.desc !== '暂无描述') {
                    html += '<div class="desc">' + work.desc.substring(0, 80) + (work.desc.length > 80 ? '...' : '') +
                    '</div>';
                }
                html += '<div class="footer-row">';
                if (work.tag) html += '<span class="tag">' + work.tag + '</span>';
                html += '<span class="view-btn">查看详情 <i class="fas fa-arrow-right"></i></span>';
                html += '</div></div></div>';
                return html;
            }

            // ============================================================
            // 渲染分页
            // ============================================================
            function renderPage() {
                var total = filteredWorks.length;
                var totalPages = Math.ceil(total / pageSize) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * pageSize;
                var end = Math.min(start + pageSize, total);
                var pageItems = filteredWorks.slice(start, end);

                if (pageItems.length === 0) {
                    cardGrid.innerHTML = '<div class="empty-state">没有匹配的作品</div>';
                } else {
                    var html = '';
                    pageItems.forEach(function(work) {
                        html += renderCard(work);
                    });
                    cardGrid.innerHTML = html;
                }

                pageInfo.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
            }

            // ============================================================
            // 筛选（增加状态筛选）
            // ============================================================
            function applyFilters() {
                var searchTerm = searchInput.value.trim().toLowerCase();
                var activeCategory = document.querySelector('.category-tag.active');
                var catFilter = activeCategory ? activeCategory.dataset.cat : '全部';
                var activePlatform = document.querySelector('.filter-tag.active');
                var platformFilter = activePlatform ? activePlatform.dataset.filter : '全部';
                var activeStatus = document.querySelector('.status-tag.active');
                var statusFilter = activeStatus ? activeStatus.dataset.status : 'all';

                filteredWorks = allWorks.filter(function(work) {
                    // 分类筛选
                    if (catFilter !== '全部' && work.category !== catFilter) return false;
                    // 平台筛选
                    if (platformFilter !== '全部') {
                        var type = work.type || '迷你世界';
                        if (platformFilter === 'MC') {
                            if (!type.toLowerCase().includes('minecraft') && !type.toLowerCase().includes('mc'))
                                return false;
                        } else {
                            if (type.toLowerCase().includes('minecraft') || type.toLowerCase().includes('mc'))
                                return false;
                        }
                    }
                    // 状态筛选
                    if (statusFilter !== 'all') {
                        if (work.status !== statusFilter) return false;
                    }
                    // 搜索
                    if (searchTerm) {
                        var inTitle = work.title.toLowerCase().includes(searchTerm);
                        var inAuthor = work.author.toLowerCase().includes(searchTerm);
                        if (!inTitle && !inAuthor) return false;
                    }
                    return true;
                });

                filteredWorks.sort(function(a, b) {
                    if (a.isFeatured && !b.isFeatured) return -1;
                    if (!a.isFeatured && b.isFeatured) return 1;
                    if (a.date === '未知' && b.date === '未知') return 0;
                    if (a.date === '未知') return 1;
                    if (b.date === '未知') return -1;
                    return b.date.localeCompare(a.date);
                });

                currentPage = 1;
                renderPage();
            }

            // ============================================================
            // 加载数据（不变）
            // ============================================================
            function loadData() {
                cardGrid.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i>加载作品中...</div>';

                var REPO_OWNER = 'jgcgzs';
                var REPO_NAME = 'acns';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var blogApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=blog&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(blogApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var mapIssues = results[0] || [];
                    var memberIssues = results[1] || [];
                    var blogIssues = results[2] || [];

                    allWorks = mapIssues.map(function(i) { return parseWorkIssue(i); });

                    if (memberIssues.length) {
                        memberIssues.forEach(function(m) {
                            var parsed = parseMemberMinid(m);
                            if (parsed.name && parsed.minid) {
                                memberMinidMap[parsed.name] = parsed.minid;
                            }
                        });
                        allMembers = memberIssues.map(function(i) {
                            return parseFullMemberIssue(i);
                        });
                        allMembers = allMembers.filter(function(m) {
                            if (m.groups && m.groups.length) return true;
                            if (m.role === '室长' || m.role === '副室长') return true;
                            return false;
                        });
                    } else {
                        allMembers = [];
                        memberMinidMap = {};
                    }

                    window._memberData = allMembers;

                    var allMaps = mapIssues.map(function(i) {
                        var title = i.title && i.title.trim() !== '' ? i.title.trim() : '未命名地图';
                        var body = i.body || '';
                        var author = '',
                            cover = '',
                            tag = '',
                            dateStr = '未知';
                        var lines = body.split('\n');
                        lines.forEach(function(line) {
                            var trimmed = line.trim();
                            if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '')
                            .trim();
                        });
                        var d = parseDateFromBody(body);
                        if (d) dateStr = d;
                        return { id: i.number, title: title, author: author || '未知作者', cover: cover, tag: tag ||
                                '', date: dateStr };
                    });
                    window._mapData = allMaps;

                    var allBlogs = blogIssues.map(function(i) {
                        var rawTitle = i.title && i.title.trim() !== '' ? i.title.trim() : '未命名文章';
                        var body = i.body || '';
                        var author = '',
                            category = '';
                        var lines = body.split('\n');
                        lines.forEach(function(line) {
                            var trimmed = line.trim();
                            if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                                var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                                category = cats.split(/[,，、\s]+/)[0] || '未分类';
                            }
                        });
                        if (!author) author = i.user ? i.user.login : '未知作者';
                        if (!category) category = '未分类';
                        var dateStr = '未知';
                        var dateMatch = rawTitle.match(/^(\d{4})-(\d{2})-(\d{2})/);
                        if (dateMatch) {
                            var y = parseInt(dateMatch[1]),
                                m = parseInt(dateMatch[2]),
                                d = parseInt(dateMatch[3]);
                            if (y >= 2000 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                                dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                            }
                        }
                        var title = rawTitle.replace(/^\d{4}-\d{2}-\d{2}-/, '').trim() || rawTitle;
                        return { id: i.number, title: title, author: author, category: category, date: dateStr };
                    });
                    window._blogData = allBlogs;

                    applyFilters();
                }).catch(function(err) {
                    console.warn('加载失败:', err);
                    cardGrid.innerHTML =
                        '<div class="empty-state"><i class="fas fa-exclamation-circle" style="display:block;font-size:24px;margin-bottom:8px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                });
            }

            // ============================================================
            // 完整成员解析
            // ============================================================
            function parseFullMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [],
                    minid = '未知',
                    id = '未知',
                    joinDate = '未知',
                    avatar = '',
                    background = '',
                    bio = '',
                    pinnedMap = '',
                    pinnedBlog = '',
                    role = '';
                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    }
                });
                if (groups.length === 0 && (role === '室长' || role === '副室长')) groups = ['管理层'];
                if (bio) bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                var attrType = '未知';
                if (id && id.length >= 1) {
                    var firstChar = id.charAt(0);
                    if (firstChar === '1') attrType = '正式成员';
                    else if (firstChar === '2') attrType = '外部成员';
                    else if (firstChar === '3') attrType = '特招成员';
                }
                return { name, role, groups, minid, id, joinDate, avatar, background, bio, pinnedMap, pinnedBlog,
                    attrType };
            }

            // ============================================================
            // 打开详情弹窗 — 类型标签移到标题上方
            // ============================================================
            window.openDetail = function(id) {
                var work = allWorks.find(function(w) { return w.id === id; });
                if (!work) return;

                // 背景图
                var bgUrl = (work.cover && work.cover.trim().startsWith('http')) ? work.cover.trim() : '';
                if (bgUrl) {
                    detailContent.style.backgroundImage = 'url(' + bgUrl + ')';
                    detailContent.classList.add('has-bg');
                } else {
                    detailContent.style.backgroundImage = '';
                    detailContent.classList.remove('has-bg');
                }

                // 构建详情内容
                var coverHtml = (work.cover && work.cover.trim().startsWith('http')) ?
                    '<img src="' + work.cover.trim() + '" alt="' + work.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';

                var typeLabel = work.type || '迷你世界';
                var isMC = (typeLabel.toLowerCase().includes('minecraft') || typeLabel.toLowerCase().includes('mc'));
                var typeClass = isMC ? 'mc' : '';

                var statusMap = {
                    '策划中': 'planning',
                    '开发中': 'developing',
                    '测试中': 'testing',
                    '更新中': 'updating',
                    '待发布': 'pending',
                    '已完结': 'completed',
                    '已完善': 'completed'
                };
                var statusDot = statusMap[work.status] || 'planning';

                var finalMinid = (work.author && memberMinidMap[work.author]) ? memberMinidMap[work.author] : (work.minid ||
                    '未录入');

                var progressNum = parseInt(work.progress);
                var progressDisplay = progressNum ? progressNum + '%' : (work.progress || '未知');

                var html = '';
                html += '<div class="detail-grid">';

                // 左侧
                html += '<div class="detail-left">';
                html += '<div class="detail-cover">' + coverHtml +
                    '</div>'; // 移除封面上的类型标签

                html += '<div class="info-card">';
                html += '<div class="row"><span class="label">作品名称</span><span class="value">' + work.title +
                    '</span></div>';
                if (work.workId) {
                    html += '<div class="row"><span class="label">作品ID</span><span class="value">' + work.workId +
                        ' <button class="copy-btn" onclick="copyText(\'' + work.workId +
                        '\',\'作品ID\')"><i class="fas fa-copy"></i> 复制</button></span></div>';
                }
                html += '<div class="row"><span class="label">作者</span><span class="value"><a href="javascript:void(0)" class="author-link" data-author="' +
                    work.author + '" style="color:var(--blue-primary);font-weight:600;cursor:pointer;">' + work.author +
                    '</a></span></div>';
                html += '<div class="row"><span class="label">迷你号</span><span class="value">' + finalMinid +
                    ' <button class="copy-btn" onclick="copyText(\'' + finalMinid +
                    '\',\'迷你号\')"><i class="fas fa-copy"></i> 复制</button></span></div>';
                html += '<div class="row"><span class="label">发布日期</span><span class="value">' + work.date +
                    '</span></div>';
                if (work.download) {
                    html += '<div class="row"><span class="label">下载链接</span><span class="value"><a href="' +
                        work.download + '" target="_blank" rel="noopener">' + work.download +
                        '</a> <button class="copy-btn" onclick="copyText(\'' + work.download +
                        '\',\'下载链接\')"><i class="fas fa-copy"></i> 复制</button></span></div>';
                }
                html += '</div></div>';

                // 右侧
                html += '<div class="detail-right">';
                // 类型标签放在标题上方
                html += '<span class="type-label ' + typeClass + '">' + typeLabel + '</span>';
                html += '<div class="title-section"><h2>' + work.title + '</h2>';
                if (work.tag) html += '<div class="subtitle">' + work.tag + '</div>';
                html += '</div>';

                html += '<div class="status-section">';
                html += '<div class="status-item"><span class="dot ' + statusDot + '"></span> 状态：<span class="value">' +
                    (work.status || '未指定') + '</span></div>';
                html += '<div class="status-item"><span class="label">进度：</span><span class="value">' +
                    progressDisplay + '</span></div>';
                html += '</div>';

                if (progressNum && !isNaN(progressNum) && progressNum >= 0 && progressNum <= 100) {
                    html += '<div class="progress-section"><div class="progress-header"><span>开发进度</span><span>' +
                        progressNum + '%</span></div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' +
                        progressNum + '%;"></div></div></div>';
                }

                if (work.desc && work.desc !== '暂无描述') {
                    html += '<div class="desc-section">' + work.desc.replace(/\n/g, '<br>') + '</div>';
                }

                if (work.announcement) {
                    html += '<div class="announcement"><div class="announce-label"><i class="fas fa-bullhorn"></i> 公告</div>' +
                        work.announcement.replace(/\n/g, '<br>') + '</div>';
                }

                html += '</div></div>';

                detailBody.innerHTML = html;
                detailModal.classList.add('active');
                document.body.style.overflow = 'hidden';

                // 绑定作者点击
                var authorLink = detailBody.querySelector('.author-link');
                if (authorLink) {
                    authorLink.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var authorName = this.dataset.author;
                        if (typeof window.openMemberModal === 'function') {
                            window._memberData = allMembers;
                            window.openMemberModal(authorName);
                        } else {
                            console.warn('公共组件未加载');
                        }
                    });
                }
            };

            // ============================================================
            // 关闭详情弹窗
            // ============================================================
            function closeDetail() {
                detailModal.classList.remove('active');
                document.body.style.overflow = '';
                detailContent.style.backgroundImage = '';
                detailContent.classList.remove('has-bg');
            }

            detailClose.addEventListener('click', closeDetail);
            detailModal.addEventListener('click', function(e) {
                if (e.target === detailModal) closeDetail();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (detailModal.classList.contains('active')) closeDetail();
                    if (modalOverlay.classList.contains('active')) {
                        modalOverlay.classList.remove('active');
                        document.body.style.overflow = '';
                        modalContent.style.backgroundImage = '';
                        modalContent.classList.remove('has-bg');
                    }
                }
            });

            // ============================================================
            // 公共弹窗关闭（不变）
            // ============================================================
            if (modalClose) {
                modalClose.addEventListener('click', function() {
                    modalOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                    modalContent.style.backgroundImage = '';
                    modalContent.classList.remove('has-bg');
                });
            }
            if (modalOverlay) {
                modalOverlay.addEventListener('click', function(e) {
                    if (e.target === modalOverlay) {
                        modalOverlay.classList.remove('active');
                        document.body.style.overflow = '';
                        modalContent.style.backgroundImage = '';
                        modalContent.classList.remove('has-bg');
                    }
                });
            }

            // ============================================================
            // 事件绑定（增加状态筛选）
            // ============================================================
            categoryBar.addEventListener('click', function(e) {
                var target = e.target.closest('.category-tag');
                if (!target) return;
                document.querySelectorAll('.category-tag').forEach(function(el) {
                    el.classList.remove('active');
                });
                target.classList.add('active');
                applyFilters();
            });

            document.querySelectorAll('.filter-tag').forEach(function(el) {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tag').forEach(function(f) {
                        f.classList.remove('active');
                    });
                    this.classList.add('active');
                    applyFilters();
                });
            });

            // 状态筛选点击
            statusBar.addEventListener('click', function(e) {
                var target = e.target.closest('.status-tag');
                if (!target) return;
                document.querySelectorAll('.status-tag').forEach(function(el) {
                    el.classList.remove('active');
                });
                target.classList.add('active');
                applyFilters();
            });

            searchInput.addEventListener('input', function() {
                applyFilters();
            });

            prevBtn.addEventListener('click', function() {
                if (currentPage > 1) { currentPage--;
                    renderPage(); }
            });
            nextBtn.addEventListener('click', function() {
                var total = filteredWorks.length;
                var totalPages = Math.ceil(total / pageSize);
                if (currentPage < totalPages) { currentPage++;
                    renderPage(); }
            });

            // ============================================================
            // 启动
            // ============================================================
            loadData();

        })();
    </script>

</body>
</html>
