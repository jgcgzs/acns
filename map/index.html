<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>地图库 - 极光创工作室</title>
    <meta name="description" content="极光创工作室地图库 - 迷你世界地图作品展示">
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 公共组件样式 -->
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        /* ===== 地图库独有样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f9fe;
            color: #1a2a3a;
            line-height: 1.7;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --blue-primary: #1a7fc4;
            --blue-primary-dark: #0f6aad;
            --blue-bg-light: #ecf5fa;
            --blue-bg-pale: #f5f9fe;
            --white: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --radius: 2px;
            --green-primary: #16a34a;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--blue-primary);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: var(--radius);
        }
        .nav-links li a:hover {
            background: var(--blue-bg-light);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        .page-header {
            padding: 24px 0 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .page-header .sub {
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 180px;
            padding: 8px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--white);
            transition: border-color 0.25s;
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--blue-primary);
        }
        .search-bar .search-btn {
            background: var(--blue-primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s;
        }
        .search-bar .search-btn:hover {
            background: var(--blue-primary-dark);
        }

        .tag-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding: 4px 0 16px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .tag-bar::-webkit-scrollbar {
            height: 4px;
            background: var(--border-light);
        }
        .tag-bar::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 2px;
        }
        .tag-item {
            flex: 0 0 auto;
            padding: 4px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tag-item:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .tag-item.active {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
            background: var(--blue-bg-light);
        }

        .preview-section {
            margin: 16px 0 32px;
        }
        .preview-section .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .preview-section .preview-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .preview-section .preview-header .count {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .preview-scroll {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 12px;
            margin: 0 -4px;
        }
        .preview-scroll::-webkit-scrollbar {
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
        }
        .preview-scroll::-webkit-scrollbar-thumb {
            background: var(--blue-primary);
            border-radius: 3px;
        }
        .preview-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 20px;
            width: max-content;
            padding: 0 4px;
        }
        .preview-card {
            flex: 0 0 200px;
            max-width: 200px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .preview-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .preview-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
        }
        .preview-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .preview-card .body {
            padding: 10px 12px 12px;
        }
        .preview-card .body .title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-card .body .meta {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 2px;
        }
        .preview-empty {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            opacity: 0.4;
            font-size: 14px;
        }

        .map-grid-container {
            margin-top: 8px;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .map-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .map-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--blue-primary);
            transform: translateY(-3px);
        }
        .map-card .cover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
        }
        .map-card .cover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: var(--blue-primary);
            opacity: 0.2;
        }
        .map-card .body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .map-card .body .tag-blue {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 10px;
            border: 1.5px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 3px;
            letter-spacing: 0.3px;
            display: inline-block;
            line-height: 1.5;
            align-self: flex-start;
        }
        .map-card .body .tag-green {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 10px;
            border: 1.5px solid var(--green-primary);
            color: var(--green-primary);
            background: transparent;
            border-radius: 3px;
            letter-spacing: 0.3px;
            display: inline-block;
            line-height: 1.5;
            align-self: flex-start;
        }
        .map-card .body .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .map-card .body .date-row {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.55;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }
        .map-card .body .date-row i {
            font-size: 11px;
            opacity: 0.5;
        }
        .map-card .body .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            flex-wrap: wrap;
            gap: 2px 8px;
        }
        .map-card .body .meta-row .author {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: var(--blue-primary);
            font-weight: 500;
            transition: color 0.2s;
        }
        .map-card .body .meta-row .author:hover {
            color: var(--blue-primary-dark);
            text-decoration: underline;
        }
        .map-card .body .meta-row .author i {
            font-size: 10px;
            opacity: 0.5;
        }
        .map-card .body .meta-row .minid {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 11px;
        }
        .map-card .body .desc-box {
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 6px 10px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 48px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            background: var(--white);
            color: var(--text-dark);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 36px;
        }
        .pagination button:hover:not(:disabled) {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }
        .pagination button.active {
            background: var(--blue-primary);
            color: #fff;
            border-color: var(--blue-primary);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination .info {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.5;
            padding: 0 8px;
        }

        .loading-placeholder,
        .empty-placeholder {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            opacity: 0.4;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .loading-placeholder i {
            display: block;
            font-size: 28px;
            color: var(--blue-primary);
            margin-bottom: 10px;
        }

        @media (max-width: 992px) {
            .map-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links li a {
                padding: 10px 16px;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .preview-card {
                flex: 0 0 160px;
                max-width: 160px;
            }
            .preview-card .body .title {
                font-size: 13px;
            }
            .page-header h1 {
                font-size: 24px;
            }
            .search-bar input {
                min-width: 140px;
            }
            .tag-item {
                font-size: 12px;
                padding: 3px 12px;
            }
            .navbar-brand .brand-text {
                font-size: 17px;
            }
            .navbar-brand .logo {
                height: 28px;
            }
        }
        @media (max-width: 480px) {
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .map-card .body {
                padding: 8px 10px 10px;
            }
            .map-card .body .title {
                font-size: 13px;
            }
            .map-card .body .desc-box {
                font-size: 11px;
                padding: 4px 8px;
                min-height: 36px;
                -webkit-line-clamp: 2;
            }
            .map-card .body .tag-blue,
            .map-card .body .tag-green {
                font-size: 9px;
                padding: 0 8px;
                border-width: 1px;
            }
            .map-card .body .date-row {
                font-size: 11px;
            }
            .map-card .body .meta-row {
                font-size: 11px;
            }
            .preview-card {
                flex: 0 0 140px;
                max-width: 140px;
            }
            .preview-card .body .title {
                font-size: 12px;
            }
            .search-bar input {
                font-size: 13px;
                padding: 6px 12px;
            }
            .search-bar .search-btn {
                font-size: 13px;
                padding: 6px 14px;
            }
            .container {
                padding: 0 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../">主站</a></li>
                <li><a href="./" class="active">地图库</a></li>
                <li><a href="../blog/">极创博客</a></li>
                <li><a href="../Management/">管理层成员公示</a></li>
                <li><a href="../Management/member.html">成员档案</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 地图库内容 ===== -->
    <main>
        <div class="container">
            <div class="page-header">
                <h1>地图库</h1>
                <div class="sub">所有极光创工作室发布的地图作品</div>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索地图名称、作者、迷你号..." />
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>

            <!-- 标签栏 -->
            <div class="tag-bar" id="tagBar">
                <span class="tag-item active" data-tag="all">全部</span>
                <span class="tag-item" data-tag="策划中">策划中</span>
                <span class="tag-item" data-tag="制作中">制作中</span>
                <span class="tag-item" data-tag="更新中">更新中</span>
                <span class="tag-item" data-tag="待发布">待发布</span>
                <span class="tag-item" data-tag="测试中">测试中</span>
                <span class="tag-item" data-tag="已完结">已完结</span>
                <span class="tag-item" data-tag="精选">精选</span>
            </div>

            <!-- 预告栏 -->
            <section class="preview-section" id="previewSection">
                <div class="preview-header">
                    <h3>即将发布 <span class="count" id="previewCount">0</span></h3>
                </div>
                <div class="preview-scroll" id="previewScroll">
                    <div class="preview-grid" id="previewGrid">
                        <div class="preview-empty">加载中...</div>
                    </div>
                </div>
            </section>

            <!-- 全部地图 -->
            <div class="map-grid-container">
                <div class="map-grid" id="mapGrid">
                    <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载地图中...</div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button id="prevPage" disabled>‹</button>
                <span id="pageInfo" class="info">第 1 / 1 页</span>
                <button id="nextPage" disabled>›</button>
            </div>
        </div>
    </main>

    <!-- ===== 弹窗结构（公共组件） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-inner" id="modalInner">
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <!-- ===== 底部 ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span> Aurora Creation Studio</span>
        </div>
    </footer>

    <!-- 引入公共脚本 -->
    <script src="../assets/js/components.js"></script>

    <script>
        (function() {

            // ===== 移动端菜单 =====
            const toggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ============================================================
            // 解析工具（使用公共函数，若无则本地定义）
            // ============================================================
            var parseDateFromBody = window.parseDateFromBody || function(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]),
                            month = parseInt(match[2]),
                            day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        }
                    }
                }
                return null;
            };

            var extractTitlePrefix = window.extractTitlePrefix || function(title) {
                var match = title.match(/^\[([^\]]+)\]\s*(.*)/);
                if (match) { return { prefix: match[1].trim(), cleanTitle: match[2].trim() || title }; }
                return null;
            };

            // ============================================================
            // 解析地图Issue
            // ============================================================
            function parseMapIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名地图';
                var body = issue.body || '';
                var author = '',
                    cover = '',
                    desc = '',
                    tag = '',
                    minid = '';
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    else if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '').trim();
                    else if (trimmed.match(/^描述[：:]\s*(.+)/)) desc = trimmed.replace(/^描述[：:]\s*/, '').trim();
                    else if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '').trim();
                    else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim();
                });
                if (!author || author.trim() === '') author = '未知作者';
                if (!desc || desc.trim() === '') desc = '暂无描述';
                var dateStr = parseDateFromBody(body);
                if (!dateStr) dateStr = '未知';
                var prefixInfo = extractTitlePrefix(title);
                var displayTitle = title;
                if (prefixInfo) { displayTitle = prefixInfo.cleanTitle;
                    tag = prefixInfo.prefix; }
                var isFeatured = /\[精选\]/.test(title) || tag === '精选';
                return {
                    id: issue.number,
                    title: displayTitle,
                    author: author,
                    cover: cover,
                    desc: desc,
                    tag: tag || '',
                    minid: minid || '',
                    date: dateStr,
                    raw: issue,
                    isFeatured: isFeatured,
                    isGreenTag: !!prefixInfo
                };
            }

            // ============================================================
            // 解析成员Issue（用于迷你号映射和弹窗）
            // ============================================================
            function parseMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [],
                    minid = '未知',
                    id = '未知',
                    joinDate = '未知',
                    avatar = '',
                    background = '',
                    bio = '',
                    pinnedMap = '',
                    pinnedBlog = '',
                    role = '';
                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    }
                });
                if (groups.length === 0 && (role === '室长' || role === '副室长')) groups = ['管理层'];
                if (bio) bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                return { name, role, groups, minid, id, joinDate, avatar, background, bio, pinnedMap, pinnedBlog };
            }

            function parseBlogIssue(issue) {
                var rawTitle = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名文章';
                var body = issue.body || '';
                var author = '',
                    category = '';
                var lines = body.split('\n');
                var contentStart = 0;
                lines.forEach(function(line, idx) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    else if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                        var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                        category = cats.split(/[,，、\s]+/)[0] || '未分类';
                    }
                    if (contentStart === 0 && trimmed && !trimmed.match(/^(作者|分类)[：:]/)) contentStart = idx;
                });
                if (!author) author = issue.user ? issue.user.login : '未知作者';
                if (!category) category = '未分类';
                var contentLines = lines.slice(contentStart);
                var contentText = contentLines.join(' ').replace(/[#*`>\[\]()]/g, ' ').replace(/\s+/g, ' ').trim();
                var summary = contentText.substring(0, 150) + (contentText.length > 150 ? '...' : '');
                var dateStr = '未知';
                var dateMatch = rawTitle.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (dateMatch) {
                    var y = parseInt(dateMatch[1]),
                        m = parseInt(dateMatch[2]),
                        d = parseInt(dateMatch[3]);
                    if (y >= 2000 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                        dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    }
                } else {
                    var d = new Date(issue.created_at);
                    dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate())
                        .padStart(2, '0');
                }
                var title = rawTitle.replace(/^\d{4}-\d{2}-\d{2}-/, '').trim() || rawTitle;
                return { id: issue.number, title, author, category, summary, date: dateStr };
            }

            // ============================================================
            // 状态
            // ============================================================
            let allMaps = [];
            let filteredMaps = [];
            let currentPage = 1;
            const pageSize = 16;
            let memberMinidMap = {};
            let allMembers = [];
            let allBlogs = [];

            const mapGrid = document.getElementById('mapGrid');
            const previewGrid = document.getElementById('previewGrid');
            const previewCount = document.getElementById('previewCount');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const tagBar = document.getElementById('tagBar');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');

            // ============================================================
            // 渲染地图卡片
            // ============================================================
            function renderMapCard(map) {
                var coverHtml = (map.cover && map.cover.trim().startsWith('http')) ?
                    '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';
                var tagClass = map.isGreenTag ? 'tag-green' : 'tag-blue';
                var tagHtml = map.tag ? '<span class="' + tagClass + '">' + map.tag + '</span>' : '';
                // 迷你号：成员档案 > 地图正文 > 未知
                var finalMinid = (map.author && memberMinidMap[map.author]) ? memberMinidMap[map.author] : (map.minid ||
                    '未知');
                var authorHtml = '<span class="author" data-author="' + map.author + '"><i class="fas fa-user"></i> ' + map
                    .author + '</span>';
                var html = '<div class="map-card">';
                html += coverHtml;
                html += '<div class="body">';
                html += tagHtml;
                html += '<span class="title">' + map.title + '</span>';
                html += '<div class="date-row"><i class="fas fa-calendar-alt"></i> ' + map.date + '</div>';
                html += '<div class="meta-row">' + authorHtml + '<span class="minid">迷你号 ' + finalMinid + '</span></div>';
                html += '<div class="desc-box">' + map.desc + '</div>';
                html += '</div></div>';
                return html;
            }

            function renderPreviewCard(map) {
                var coverHtml = (map.cover && map.cover.trim().startsWith('http')) ?
                    '<img class="cover" src="' + map.cover.trim() + '" alt="' + map.title + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    '<div class="cover-placeholder"><i class="fas fa-image"></i></div>';
                return '<div class="preview-card">' + coverHtml +
                    '<div class="body"><div class="title">' + map.title + '</div><div class="meta">' + map.author +
                    ' · ' + map.date + '</div></div></div>';
            }

            // ============================================================
            // 分页渲染
            // ============================================================
            function renderPage() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                var start = (currentPage - 1) * pageSize;
                var end = Math.min(start + pageSize, total);
                var pageItems = filteredMaps.slice(start, end);

                if (pageItems.length === 0) {
                    mapGrid.innerHTML = '<div class="empty-placeholder">没有匹配的地图</div>';
                } else {
                    var html = '';
                    pageItems.forEach(function(map) { html += renderMapCard(map); });
                    mapGrid.innerHTML = html;
                }

                pageInfo.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页';
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;

                // 绑定作者点击事件（调用公共弹窗）
                mapGrid.querySelectorAll('.author').forEach(function(el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var authorName = this.dataset.author;
                        if (typeof window.openMemberModal === 'function') {
                            window.openMemberModal(authorName);
                        } else {
                            alert('公共组件未加载，请检查 assets/js/components.js');
                        }
                    });
                });
            }

            // ============================================================
            // 预告
            // ============================================================
            function renderPreview() {
                var previewMaps = allMaps.filter(function(m) { return m.tag === '待发布'; });
                previewCount.textContent = previewMaps.length;
                if (previewMaps.length === 0) {
                    previewGrid.innerHTML = '<div class="preview-empty">暂无待发布地图</div>';
                    return;
                }
                var html = '';
                previewMaps.forEach(function(map) { html += renderPreviewCard(map); });
                previewGrid.innerHTML = html;
            }

            // ============================================================
            // 筛选与搜索
            // ============================================================
            function applyFilters() {
                var searchTerm = searchInput.value.trim().toLowerCase();
                var activeTag = document.querySelector('.tag-item.active');
                var tagFilter = activeTag ? activeTag.dataset.tag : 'all';

                filteredMaps = allMaps.filter(function(map) {
                    if (tagFilter !== 'all') {
                        if (tagFilter === '精选') {
                            if (!map.isFeatured) return false;
                        } else {
                            if (map.tag !== tagFilter) return false;
                        }
                    }
                    if (searchTerm) {
                        var inTitle = map.title.toLowerCase().includes(searchTerm);
                        var inAuthor = map.author.toLowerCase().includes(searchTerm);
                        var finalMinid = (map.author && memberMinidMap[map.author]) ? memberMinidMap[map.author] : (map
                            .minid || '未知');
                        var inMinid = finalMinid.includes(searchTerm);
                        if (!inTitle && !inAuthor && !inMinid) return false;
                    }
                    return true;
                });

                filteredMaps.sort(function(a, b) {
                    if (a.date === '未知' && b.date === '未知') return 0;
                    if (a.date === '未知') return 1;
                    if (b.date === '未知') return -1;
                    return b.date.localeCompare(a.date);
                });

                currentPage = 1;
                renderPage();
                renderPreview();
            }

            // ============================================================
            // 加载数据
            // ============================================================
            function loadData() {
                mapGrid.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载地图中...</div>';

                var REPO_OWNER = 'jgcgzs',
                    REPO_NAME = 'acns';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var blogApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=blog&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(blogApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var mapIssues = results[0] || [],
                        memberIssues = results[1] || [],
                        blogIssues = results[2] || [];
                    allMaps = mapIssues.map(function(i) { return parseMapIssue(i); });

                    if (memberIssues.length) {
                        allMembers = memberIssues.map(function(i) { return parseMemberIssue(i); });
                        allMembers = allMembers.filter(function(m) {
                            if (m.groups && m.groups.length) return true;
                            if (m.role === '室长' || m.role === '副室长') return true;
                            return false;
                        });
                        memberMinidMap = {};
                        allMembers.forEach(function(m) { if (m.name && m.minid) memberMinidMap[m.name] = m.minid; });
                    } else {
                        allMembers = [];
                        memberMinidMap = {};
                    }

                    allBlogs = blogIssues.map(function(i) { return parseBlogIssue(i); });

                    // 挂载到全局供弹窗使用
                    window._memberData = allMembers;
                    window._mapData = allMaps;
                    window._blogData = allBlogs;

                    applyFilters();
                }).catch(function(err) {
                    console.warn('加载失败:', err);
                    mapGrid.innerHTML =
                        '<div class="empty-placeholder"><i class="fas fa-exclamation-circle" style="display:block;font-size:24px;margin-bottom:8px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                    previewGrid.innerHTML = '<div class="preview-empty">加载失败</div>';
                    previewCount.textContent = '0';
                });
            }

            // ============================================================
            // 事件绑定
            // ============================================================
            tagBar.addEventListener('click', function(e) {
                var target = e.target.closest('.tag-item');
                if (!target) return;
                document.querySelectorAll('.tag-item').forEach(function(el) { el.classList.remove('active'); });
                target.classList.add('active');
                applyFilters();
            });

            searchBtn.addEventListener('click', applyFilters);
            searchInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') applyFilters(); });

            prevBtn.addEventListener('click', function() { if (currentPage > 1) { currentPage--;
                    renderPage(); } });
            nextBtn.addEventListener('click', function() {
                var total = filteredMaps.length;
                var totalPages = Math.ceil(total / pageSize);
                if (currentPage < totalPages) { currentPage++;
                    renderPage(); }
            });

            // ============================================================
            // 启动
            // ============================================================
            loadData();

        })();
    </script>

</body>
</html>
