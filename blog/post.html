<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文章详情 - 极光创工作室</title>
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 直接复用列表页样式，为了简洁此处省略（实际部署时需包含完整样式） */
        /* 但为保障独立运行，我将关键样式复制在此 */
        /* 由于篇幅限制，此处假设样式已存在，实际交付时包含完整样式 */
        /* 以下为必要样式，完整样式参考列表页 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f9fe;
            color: #1a2a3a;
            line-height: 1.7;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --blue-primary: #1a7fc4;
            --blue-primary-dark: #0f6aad;
            --blue-bg-light: #ecf5fa;
            --blue-bg-pale: #f5f9fe;
            --white: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --radius: 2px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--blue-primary);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: var(--radius);
        }
        .nav-links li a:hover {
            background: var(--blue-bg-light);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        /* 详情页独有样式 */
        .back-bar {
            padding: 16px 0 8px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--blue-primary);
            padding: 6px 16px;
            border: 1px solid var(--blue-primary);
            border-radius: var(--radius);
            transition: background 0.25s, color 0.25s;
            cursor: pointer;
            background: transparent;
        }
        .back-btn:hover {
            background: var(--blue-primary);
            color: #fff;
        }

        .post-header {
            margin-bottom: 24px;
        }
        .post-header .post-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 14px;
            border: 1.5px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .post-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .post-header .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .post-header .post-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-header .post-meta i {
            font-size: 13px;
            opacity: 0.5;
        }
        .post-header .post-meta .author-link {
            cursor: pointer;
            color: var(--blue-primary);
            font-weight: 500;
        }
        .post-header .post-meta .author-link:hover {
            text-decoration: underline;
        }

        .post-body {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 32px 36px;
            box-shadow: var(--shadow-sm);
            font-size: 16px;
            line-height: 1.9;
            color: var(--text-dark);
        }
        .post-body p {
            margin-bottom: 16px;
        }
        .post-body p:last-child {
            margin-bottom: 0;
        }
        .post-body h2,
        .post-body h3 {
            margin: 24px 0 12px;
            font-weight: 700;
        }
        .post-body h2 {
            font-size: 24px;
        }
        .post-body h3 {
            font-size: 20px;
        }
        .post-body ul,
        .post-body ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }
        .post-body li {
            margin-bottom: 4px;
        }
        .post-body blockquote {
            border-left: 4px solid var(--blue-primary);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-muted);
            background: var(--blue-bg-light);
            padding: 12px 20px;
            border-radius: var(--radius);
        }
        .post-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 12px 0;
            border: 1px solid var(--border-light);
        }
        .post-body code {
            background: var(--blue-bg-light);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 14px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .post-body pre {
            background: #1a2a3a;
            color: #eef5ff;
            padding: 16px 20px;
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.6;
            margin: 12px 0;
        }
        .post-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .loading-state,
        .error-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .loading-state i {
            display: block;
            font-size: 32px;
            color: var(--blue-primary);
            margin-bottom: 12px;
        }

        /* 弹窗样式（与列表页一致） */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            max-width: 780px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 32px 32px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeUp 0.3s ease;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .modal-content.has-bg {
            background-color: rgba(255, 255, 255, 0.92);
            background-blend-mode: overlay;
        }
        .modal-content.has-bg .modal-inner {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: var(--radius);
            padding: 4px 0;
            margin: -4px 0;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 28px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 4px;
            z-index: 10;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--text-dark);
        }

        .modal-member {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 16px;
        }
        .modal-member .mavatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--blue-bg-light);
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--blue-primary);
            flex-shrink: 0;
            overflow: hidden;
        }
        .modal-member .mavatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-member .minfo {
            flex: 1;
        }
        .modal-member .minfo .mname {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
        }
        .modal-member .minfo .mrole {
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .modal-member .minfo .mgroups {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .modal-member .minfo .mgroups .g {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 10px;
            border: 1px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 2px;
        }
        .modal-member .minfo .mmeta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .modal-member .minfo .mmeta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .modal-member .minfo .mmeta i {
            font-size: 12px;
            opacity: 0.5;
        }

        .id-parse-detail {
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 10px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-dark);
        }
        .id-parse-detail .label {
            font-weight: 600;
            color: var(--blue-primary);
        }
        .id-parse-detail .parts {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            margin-top: 4px;
        }
        .id-parse-detail .parts span {
            font-size: 12px;
            color: var(--text-muted);
        }
        .id-parse-detail .parts .val {
            color: var(--text-dark);
            font-weight: 600;
        }

        .modal-bio {
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--text-dark);
            line-height: 1.8;
        }
        .modal-bio a {
            color: var(--blue-primary);
            text-decoration: underline;
        }
        .modal-bio a:hover {
            color: var(--blue-primary-dark);
        }

        .modal-section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 16px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-section-title .count {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .modal-works {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .modal-work-card {
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 10px 12px;
            transition: box-shadow 0.2s, transform 0.2s;
            cursor: pointer;
            overflow: hidden;
        }
        .modal-work-card:hover {
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }
        .modal-work-card .wcover {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            margin-bottom: 4px;
        }
        .modal-work-card .wcover-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--blue-primary);
            opacity: 0.2;
            margin-bottom: 4px;
        }
        .modal-work-card .wtitle {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .modal-work-card .wmeta {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: 2px;
        }
        .modal-work-empty {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0.4;
            padding: 10px 0;
            grid-column: 1 / -1;
            text-align: center;
        }

        .modal-days {
            margin-top: 14px;
            padding: 10px 16px;
            background: var(--blue-bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .modal-days .num {
            font-weight: 700;
            font-size: 20px;
            color: var(--blue-primary);
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .pinned-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            background: var(--blue-primary);
            padding: 1px 8px;
            border-radius: 10px;
            margin-left: 6px;
            letter-spacing: 0.3px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links li a {
                padding: 10px 16px;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }
            .post-header h1 {
                font-size: 26px;
            }
            .post-body {
                padding: 20px 18px;
            }
            .navbar-brand .brand-text {
                font-size: 17px;
            }
            .navbar-brand .logo {
                height: 28px;
            }
            .back-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .modal-content {
                padding: 20px 18px;
            }
            .modal-member {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .modal-member .minfo .mmeta {
                justify-content: center;
            }
            .modal-works {
                grid-template-columns: 1fr 1fr;
            }
            .modal-member .mavatar {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }
            .modal-member .minfo .mname {
                font-size: 19px;
            }
        }
        @media (max-width: 480px) {
            .post-header h1 {
                font-size: 22px;
            }
            .post-body {
                padding: 16px 14px;
                font-size: 15px;
            }
            .post-header .post-meta {
                font-size: 13px;
                gap: 8px 16px;
            }
            .container {
                padding: 0 14px;
            }
            .modal-works {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 14px 12px;
            }
            .modal-member .mavatar {
                width: 52px;
                height: 52px;
                font-size: 18px;
            }
            .modal-member .minfo .mname {
                font-size: 17px;
            }
            .modal-days {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../">主站</a></li>
                <li><a href="../map/">地图库</a></li>
                <li><a href="../blog/" class="active">极创博客</a></li>
                <li><a href="../Management/">管理层成员公示</a></li>
                <li><a href="../Management/member.html">成员档案</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 文章详情 ===== -->
    <main>
        <div class="container">
            <div class="back-bar">
                <a href="../blog/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回博客主页</a>
            </div>

            <div id="postContent">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i>加载文章...</div>
            </div>
        </div>
    </main>

    <!-- ===== 弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-inner" id="modalInner">
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <!-- ===== 底部 ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span> Aurora Creation Studio</span>
        </div>
    </footer>

    <script>
        (function() {

            // ============================================================
            // 编号解析工具（与列表页一致）
            // ============================================================
            var ATTR_MAP = { '1': '正式成员', '2': '外部成员', '3': '特招成员' };
            var GAME_MAP = { '1': '迷你世界', '2': '安慕希(MC)', '3': '迷你+安慕希' };
            var GROUP_MAP = { '1': '建筑组', '2': '玩法组', '3': '模型组', '4': '编辑组', '0': '无' };

            function parseIdNumber(id) {
                if (!id || id === '未知' || id.length < 10) return null;
                var s = id.trim();
                if (s.length < 10) return null;
                var attr = s.charAt(0);
                var game = s.charAt(1);
                var year = s.substring(2, 4);
                var month = s.substring(4, 6);
                var day = s.substring(6, 8);
                var group1 = s.charAt(8);
                var group2 = s.charAt(9);
                var dup = s.length > 10 ? s.charAt(10) : '';

                var attrName = ATTR_MAP[attr] || '未知属性';
                var gameName = GAME_MAP[game] || '未知平台';
                var group1Name = GROUP_MAP[group1] || '未知';
                var group2Name = GROUP_MAP[group2] || '无';

                var groupDisplay = group2 === '0' ? group1Name : group1Name + ' + ' + group2Name;

                var dateStr = '20' + year + '-' + month + '-' + day;
                var y = parseInt('20' + year);
                var m = parseInt(month);
                var d = parseInt(day);
                var validDate = (y >= 2020 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31);
                if (!validDate) dateStr = '日期无效';

                return {
                    raw: id,
                    attr: attr,
                    attrName: attrName,
                    game: game,
                    gameName: gameName,
                    year: '20' + year,
                    month: month,
                    day: day,
                    date: dateStr,
                    group1: group1,
                    group1Name: group1Name,
                    group2: group2,
                    group2Name: group2Name,
                    groupDisplay: groupDisplay,
                    dup: dup || '无'
                };
            }

            function renderIdParseDetail(id) {

            // ============================================================

            // ============================================================
            // 工具函数
            // ============================================================
            function parseDateFromBody(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]);
                        var month = parseInt(match[2]);
                        var day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        }
                    }
                }
                return null;
            }

            function parseMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [];
                var minid = '未知';
                var id = '未知';
                var joinDate = '未知';
                var avatar = '';
                var background = '';
                var bio = '';
                var pinnedMap = '';
                var pinnedBlog = '';
                var role = '';

                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();

                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    }
                });

                if (groups.length === 0) {
                    if (role === '室长' || role === '副室长') {
                        groups = ['管理层'];
                    }
                }

                if (bio) {
                    bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                }

                return {
                    name: name,
                    role: role,
                    groups: groups,
                    minid: minid,
                    id: id,
                    joinDate: joinDate,
                    avatar: avatar,
                    background: background,
                    bio: bio,
                    pinnedMap: pinnedMap,
                    pinnedBlog: pinnedBlog,
                    raw: issue
                };
            }

            function parseMapIssueForModal(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名地图';
                var body = issue.body || '';
                var author = '';
                var cover = '';
                var desc = '';
                var tag = '';
                var minid = '';
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) { author = trimmed.replace(/^作者[：:]\s*/, '').trim(); }
                    if (trimmed.match(/^封面[：:]\s*(.+)/)) { cover = trimmed.replace(/^封面[：:]\s*/, '').trim(); }
                    if (trimmed.match(/^描述[：:]\s*(.+)/)) { desc = trimmed.replace(/^描述[：:]\s*/, '').trim(); }
                    if (trimmed.match(/^标签[：:]\s*(.+)/)) { tag = trimmed.replace(/^标签[：:]\s*/, '').trim(); }
                    if (trimmed.match(/^迷你号[：:]\s*(.+)/)) { minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim(); }
                });
                if (!author) author = '未知作者';
                if (!desc) desc = '暂无描述';
                var dateStr = parseDateFromBody(body);
                if (!dateStr) {
                    var d = new Date(issue.created_at);
                    dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate())
                        .padStart(2, '0');
                }
                var prefixInfo = title.match(/^\[([^\]]+)\]\s*(.*)/);
                if (prefixInfo) { tag = prefixInfo[1];
                    title = prefixInfo[2].trim() || title; }
                return { id: issue.number, title: title, author: author, cover: cover, desc: desc, tag: tag || '',
                    minid: minid || '', date: dateStr };
            }

            function getDaysSince(joinDate) {
                if (!joinDate || joinDate === '未知' || joinDate === '') return null;
                var parts = joinDate.split('-');
                if (parts.length !== 3) return null;
                var y = parseInt(parts[0]),
                    m = parseInt(parts[1]) - 1,
                    d = parseInt(parts[2]);
                if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
                var start = new Date(y, m, d);
                var now = new Date();
                var diff = now - start;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            }

            // ============================================================

                var pinnedMapObj = null;

                var pinnedMapHtml = '';

                        coverHtml = '<img class="wcover" src="' + pinnedMapObj.cover.trim() + '" alt="' + pinnedMapObj
                            .title + '" loading="lazy" onerror="this.style.display=\'none\'">';
                    } else {

                    }
                    pinnedMapHtml = '<div class="modal-work-card" onclick="location.href=\'../map/?id=' + pinnedMapObj
                        .id + '\'">' +
                        coverHtml +
                        '<div class="wtitle">' + pinnedMapObj.title + ' <span class="pinned-badge">置顶</span></div>' +

                        .date + '</div>' +

                var pinnedBlogHtml = '';

                var otherMaps = memberMaps;

                }
                var mapsHtml = '';

                                '" loading="lazy" onerror="this.style.display=\'none\'">';

                        return '<div class="modal-work-card" onclick="location.href=\'../map/?id=' + m.id + '\'">' +

                var html = '';

                html += (groupsHtml ? '<div class="mgroups">' + groupsHtml + '</div>' : '');
                html += '<div class="mmeta">';
                html += '<span><i class="fas fa-id-card"></i> ' + member.id + '</span>';
                html += '<span><i class="fas fa-gamepad"></i> ' + member.minid + '</span>';
                html += '</div>';
                html += '</div></div>';

            // ============================================================
            // 加载文章
            // ============================================================
            function loadPost() {
                if (!postId) {
                    container.innerHTML = '<div class="error-state">缺少文章ID</div>';
                    return;
                }

                container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i>加载文章...</div>';

                var REPO_OWNER = 'jgcgzs';
                var REPO_NAME = 'acns';
                var postApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + postId;
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(postApi).then(function(r) { return r.ok ? r.json() : null; }),
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var issue = results[0];
                    var memberIssues = results[1] || [];
                    var mapIssues = results[2] || [];

                    if (!issue) {
                        container.innerHTML = '<div class="error-state">文章不存在</div>';
                        return;
                    }

                    // 解析成员
                    if (memberIssues.length > 0) {
                        allMembers = memberIssues.map(function(i) { return parseMemberIssue(i); });
                        allMembers = allMembers.filter(function(m) {
                            if (m.groups && m.groups.length > 0) return true;
                            if (m.role === '室长' || m.role === '副室长') return true;
                            return false;
                        });
                    } else {
                        allMembers = [];
                    }

                    // 解析地图（用于弹窗关联）
                    allMaps = mapIssues.map(function(i) { return parseMapIssueForModal(i); });

                    // 解析当前博客文章（用于弹窗关联）
                    var body = issue.body || '';
                    var author = '';
                    var category = '';
                    var lines = body.split('\n');
                    var contentStart = 0;
                    lines.forEach(function(line, idx) {
                        var trimmed = line.trim();
                        if (trimmed.match(/^作者[：:]\s*(.+)/)) {
                            author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                        } else if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                            var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                            category = cats.split(/[,，、\s]+/)[0] || '未分类';
                        }
                        if (contentStart === 0 && trimmed && !trimmed.match(/^(作者|分类)[：:]/)) {
                            contentStart = idx;
                        }
                    });
                    if (!author) author = issue.user ? issue.user.login : '未知作者';
                    if (!category) category = '未分类';
                    var dateObj = new Date(issue.created_at);
                    var dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' +
                        String(dateObj.getDate()).padStart(2, '0');

                    // 正文
                    var contentBody = lines.slice(contentStart).join('\n').trim();
                    if (!contentBody) contentBody = body;

                    // 保存当前文章信息用于弹窗关联
                    allBlogs = [{
                        id: issue.number,
                        title: issue.title,
                        author: author,
                        category: category,
                        date: dateStr
                    }];

                    // 渲染文章
                    function renderMarkdown(text) {
                        var html = text;
                        html = html.replace(/```([\s\S]*?)```/g, function(match, code) {
                            return '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') +
                            '</code></pre>';
                        });
                        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
                            '<img src="$2" alt="$1" loading="lazy">');
                        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                            '<a href="$2" target="_blank" style="color:var(--blue-primary);text-decoration:underline;">$1</a>'
                            );
                        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                        html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
                        html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
                        html = html.replace(/(<li>.*<\/li>\s*)+/g, '<ul>$&</ul>');
                        html = html.replace(/\n\s*\n/g, '</p><p>');
                        html = html.replace(/([^\n]+)/g, function(match) {
                            var trimmed = match.trim();
                            if (trimmed.startsWith('<h') || trimmed.startsWith('<ul') || trimmed.startsWith(
                                    '<li') || trimmed.startsWith('<blockquote') || trimmed.startsWith(
                                    '<pre') || trimmed.startsWith('<img') || trimmed === '') {
                                return match;
                            }
                            return '<p>' + match + '</p>';
                        });
                        html = html.replace(/<p><\/(p)>/g, '');
                        html = html.replace(/<p><blockquote>/g, '<blockquote>');
                        html = html.replace(/<\/blockquote><\/p>/g, '</blockquote>');
                        html = html.replace(/<p><ul>/g, '<ul>');
                        html = html.replace(/<\/ul><\/p>/g, '</ul>');
                        html = html.replace(/<p><li>/g, '<li>');
                        html = html.replace(/<\/li><\/p>/g, '</li>');
                        return html;
                    }

                    var renderedContent = renderMarkdown(contentBody);

                    var html = '';
                    html += '<div class="post-header">';
                    html += '<span class="post-tag">' + category + '</span>';
                    html += '<h1>' + issue.title + '</h1>';
                    html += '<div class="post-meta">';
                    html += '<span><i class="fas fa-user"></i> <span class="author-link" data-author="' + author +
                        '">' + author + '</span></span>';
                    html += '<span><i class="fas fa-calendar-alt"></i> ' + dateStr + '</span>';
                    html += '</div></div>';
                    html += '<div class="post-body">' + renderedContent + '</div>';

                    container.innerHTML = html;

                    // 绑定作者点击事件
                    container.querySelector('.author-link').addEventListener('click', function(e) {
                        e.stopPropagation();
                        var authorName = this.dataset.author;
                        var member = allMembers.find(function(m) { return m.name === authorName; });
                        if (member) {
                            modalContent.style.backgroundImage = '';
                            modalContent.classList.remove('has-bg');
                            renderMemberModal(member);
                            modalOverlay.classList.add('active');
                            document.body.style.overflow = 'hidden';
                        } else {
                            modalContent.style.backgroundImage = '';
                            modalContent.classList.remove('has-bg');
                            modalInner.innerHTML =
                                '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);">未找到该成员档案</div>';
                            modalOverlay.classList.add('active');
                            document.body.style.overflow = 'hidden';
                        }
                    });
                }).catch(function(err) {
                    console.warn('加载文章失败:', err);
                    container.innerHTML =
                        '<div class="error-state"><i class="fas fa-exclamation-circle" style="display:block;font-size:28px;margin-bottom:10px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                });
            }

            // ============================================================
            // 弹窗事件
            // ============================================================
            modalClose.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                modalContent.style.backgroundImage = '';
                modalContent.classList.remove('has-bg');
            });
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                    modalContent.style.backgroundImage = '';
                    modalContent.classList.remove('has-bg');
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    modalOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                    modalContent.style.backgroundImage = '';
                    modalContent.classList.remove('has-bg');
                }
            });

            // ============================================================
            // 初始化
            // ============================================================
            loadPost();

        })();
    </script>

</body>
</html>
