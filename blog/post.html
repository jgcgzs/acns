<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文章详情 - 极光创工作室</title>
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 公共组件样式（成员档案弹窗） -->
    <link rel="stylesheet" href="../assets/css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ===== 极光创主题样式（合并原样式） ===== */
        :root {
            --bg-primary: #f5f9fe;
            --bg-card: #ffffff;
            --text-primary: #1a2a3a;
            --text-secondary: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --accent: #1a7fc4;
            --accent-light: #ecf5fa;
            --card-radius: 2px;
            --toc-width: 240px;
        }
        * { margin:0; padding:0; box-sizing:border-box; cursor:default; }
        a,button,.nav-link { cursor:pointer; }
        :focus { outline:none; }
        html { font-size:16px; scroll-behavior:smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-top: 68px;
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== 导航栏（极光创风格） ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2.5px;
            background: var(--accent);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .nav-links li a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        .nav-links li a:hover::after { width: 50%; }
        .nav-links li a.active {
            color: var(--accent);
            font-weight: 600;
        }
        .nav-links li a.active::after { width: 50%; }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* ===== 底部（极光创风格） ===== */
        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        /* ===== 返回按钮 ===== */
        .back-bar {
            padding: 16px 0 8px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            padding: 6px 16px;
            border: 1px solid var(--accent);
            border-radius: 2px;
            transition: background 0.25s, color 0.25s;
            cursor: pointer;
            background: transparent;
            text-decoration: none;
        }
        .back-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        /* ===== 文章正文样式（保留原功能） ===== */
        .post-detail { padding: 20px 0 40px; }
        .post-wrapper {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            position: relative;
        }
        .post-main { flex: 1; min-width: 0; }

        .post-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 1.5rem;
        }
        .post-header .post-title {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: .5rem;
        }
        .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .8rem 1.5rem;
            font-size: .85rem;
            color: var(--text-secondary);
            opacity: .7;
            align-items: center;
        }
        /* ★★★ 作者名可点击 ★★★ */
        .post-meta .author {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 2px 8px 2px 2px;
            border-radius: 20px;
            transition: background 0.2s, color 0.2s;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .post-meta .author:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        .post-meta .author img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border-light);
        }
        .post-meta .author .name {
            font-weight: 500;
        }
        .post-meta .author .name:hover {
            text-decoration: underline;
        }

        .post-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            margin: 8px 0 0;
        }
        .post-categories .cat {
            font-size: .7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 0;
            color: var(--accent);
            background: transparent;
            border: 1px solid var(--accent);
            font-family: 'Inter', sans-serif;
            letter-spacing: .2px;
            display: inline-block;
            white-space: nowrap;
        }

        .post-body {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-primary);
            clear: both;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .post-body h1, .post-body h2, .post-body h3 {
            scroll-margin-top: 80px;
        }
        .post-body h1 { font-size: 2rem; font-weight: 700; margin: 1.8rem 0 .8rem; border-bottom: 2px solid var(--border-light); padding-bottom: .3rem; }
        .post-body h2 { font-size: 1.6rem; font-weight: 700; margin: 1.6rem 0 .6rem; }
        .post-body h3 { font-size: 1.3rem; font-weight: 600; margin: 1.4rem 0 .4rem; }
        .post-body p { margin: .8rem 0; }
        .post-body ul, .post-body ol { margin: .8rem 0 .8rem 1.8rem; }
        .post-body blockquote { border-left: 4px solid var(--accent); padding-left: 1.2rem; margin: 1rem 0; color: var(--text-secondary); font-style: italic; }
        .post-body code { background: var(--bg-card); padding: .1rem .4rem; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: .9em; border: 1px solid var(--border-light); }
        .post-body pre { background: var(--bg-card); padding: 1rem; overflow-x: auto; border-radius: 2px; border: 1px solid var(--border-light); margin: 1rem 0; }
        .post-body pre code { background: transparent; border: none; padding: 0; }
        .post-body img { max-width: 100%; height: auto; border-radius: 2px; margin: 1rem 0; box-shadow: var(--shadow-sm); }
        .post-body a { color: var(--accent); text-decoration: none; }
        .post-body a:hover { text-decoration: underline; }
        .post-body iframe { max-width: 100%; border: 1px solid var(--border-light); border-radius: 2px; margin: .8rem 0; }
        .post-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.92rem; min-width: 480px; }
        .post-body table th, .post-body table td { border: 1px solid var(--border-light); padding: 0.5rem 0.8rem; text-align: left; vertical-align: top; }
        .post-body table th { background: var(--accent-light); font-weight: 600; }
        .post-body table tr:nth-child(even) { background: var(--bg-primary); }
        .post-body table tr:hover { background: var(--accent-light); }
        .post-body .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 1rem 0; }
        .post-body .table-wrap table { margin: 0; }

        .html-embed-wrapper {
            border: 2px solid var(--accent);
            border-radius: 2px;
            overflow: hidden;
            margin: 1.2rem 0;
            box-shadow: 0 8px 24px rgba(26, 127, 196, 0.08);
        }
        .html-embed-wrapper iframe {
            display: block;
            border: none;
            background: #fff;
            width: 100%;
        }

        .post-loading, .post-error { text-align: center; padding: 4rem 0; color: var(--text-secondary); }
        .post-loading i, .post-error i { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
        .post-error { color: #ef4444; }

        /* 目录 */
        .post-toc {
            position: sticky;
            top: 90px;
            width: var(--toc-width);
            flex-shrink: 0;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-light) transparent;
        }
        .post-toc::-webkit-scrollbar { width: 3px; }
        .post-toc::-webkit-scrollbar-track { background: transparent; }
        .post-toc::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        .post-toc .toc-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            opacity: 0.4;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .post-toc .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post-toc .toc-list li {
            padding: 0;
            margin: 0;
            border-left: 2px solid transparent;
            transition: border-color 0.3s, background 0.3s;
        }
        .post-toc .toc-list li.active {
            border-left-color: var(--accent);
            background: var(--accent-light);
        }
        .post-toc .toc-list li a {
            display: block;
            padding: 3px 12px 3px 14px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            line-height: 1.5;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        .post-toc .toc-list li a:hover { color: var(--text-primary); }
        .post-toc .toc-list li.active a { color: var(--accent); font-weight: 600; }
        .post-toc .toc-list li.toc-h2 { padding-left: 6px; }
        .post-toc .toc-list li.toc-h3 { padding-left: 18px; }
        .post-toc .toc-list li.toc-h2 a { font-size: 0.78rem; }
        .post-toc .toc-list li.toc-h3 a { font-size: 0.72rem; opacity: 0.8; }
        .post-toc .toc-empty { font-size: 0.75rem; color: var(--text-secondary); opacity: 0.3; text-align: center; padding: 12px 0; }

        /* 移动端目录 */
        .toc-mobile {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
            padding: 8px 12px;
            max-height: 50vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .toc-mobile.open { transform: translateY(0); }
        .toc-mobile .toc-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 4px 8px 4px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .toc-mobile .toc-toggle i { transition: transform 0.3s; }
        .toc-mobile.open .toc-toggle i { transform: rotate(180deg); }
        .toc-mobile .toc-list {
            list-style: none;
            padding: 6px 0 4px;
            margin: 0;
        }
        .toc-mobile .toc-list li a {
            display: block;
            padding: 5px 8px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: background 0.2s, border-color 0.2s;
            border-radius: 0 4px 4px 0;
        }
        .toc-mobile .toc-list li a:active { background: var(--accent-light); }
        .toc-mobile .toc-list li.active a {
            border-left-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
            background: var(--accent-light);
        }
        .toc-mobile .toc-list li.toc-h2 { padding-left: 4px; }
        .toc-mobile .toc-list li.toc-h3 { padding-left: 16px; }
        .toc-mobile .toc-list li.toc-h3 a { font-size: 0.7rem; opacity: 0.8; }
        .toc-mobile .toc-close {
            text-align: center;
            padding: 6px 0 2px;
            font-size: 0.6rem;
            color: var(--text-secondary);
            opacity: 0.3;
            cursor: pointer;
        }
        .toc-float-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 89;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(26, 127, 196, 0.3);
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s, box-shadow 0.3s;
            align-items: center;
            justify-content: center;
        }
        .toc-float-btn:hover { transform: scale(1.06); box-shadow: 0 6px 30px rgba(26, 127, 196, 0.4); }
        .toc-float-btn:active { transform: scale(0.94); }

        /* 全屏嵌入 */
        .embed-fullscreen .post-body { padding: 0 !important; margin: 0 !important; }
        .embed-fullscreen .post-body .html-embed-wrapper { margin: 0 !important; border: none !important; border-radius: 0 !important; box-shadow: none !important; }
        .embed-fullscreen .post-body iframe { display: block; width: 100%; height: calc(100vh - 180px); border: none !important; border-radius: 0 !important; }
        .embed-fullscreen .post-toc, .embed-fullscreen .toc-mobile, .embed-fullscreen .toc-float-btn { display: none !important; }

        /* 响应式 */
        @media (max-width: 1024px) { .post-toc { width: 200px; } }
        @media (max-width: 860px) {
            .post-wrapper { flex-direction: column; }
            .post-toc { display: none !important; }
            .toc-mobile, .toc-float-btn { display: block; }
            .toc-mobile { display: block; }
            .embed-fullscreen .toc-float-btn { display: none !important; }
        }
        @media (max-width: 768px) {
            body { padding-top: 60px; }
            .navbar { height: 60px; }
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open { display: flex; }
            .nav-links li a { padding: 10px 16px; font-size: 16px; width: 100%; text-align: center; }
            .post-meta { flex-direction: column; gap: .4rem; }
            .post-body { font-size: .95rem; }
            .toc-float-btn { bottom: 16px; right: 16px; width: 44px; height: 44px; font-size: 1rem; }
            .post-body table { font-size: 0.78rem; min-width: 320px; }
            .navbar-brand .brand-text { font-size: 17px; }
            .navbar-brand .logo { height: 28px; }
            .container { padding: 0 14px; }
        }
        @media (max-width: 480px) {
            body { padding-top: 54px; }
            .navbar { height: 54px; }
            .navbar-brand .logo { height: 24px; }
            .navbar-brand .brand-text { font-size: 15px; }
            .post-header .post-title { font-size: 1.6rem; }
            .toc-mobile { padding: 6px 10px; max-height: 45vh; }
            .toc-mobile .toc-list li a { font-size: 0.7rem; padding: 4px 6px; }
            .toc-float-btn { bottom: 12px; right: 12px; width: 40px; height: 40px; font-size: 0.9rem; }
            .post-body table { font-size: 0.7rem; min-width: 260px; }
            .post-body table th, .post-body table td { padding: 0.2rem 0.4rem; }
            .embed-fullscreen .post-body iframe { height: calc(100vh - 160px); }
        }
        @media (max-width: 360px) {
            .post-body table { min-width: 200px; font-size: 0.65rem; }
            .embed-fullscreen .post-body iframe { height: calc(100vh - 150px); }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏（极光创） ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../">主站</a></li>
                <li><a href="../map/">地图库</a></li>
                <li><a href="../blog/" class="active">极创博客</a></li>
                <li><a href="../Management/">管理层成员公示</a></li>
                <li><a href="../Management/member.html">成员档案</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 文章主体 ===== -->
    <section class="post-detail">
        <div class="container">
            <!-- 返回按钮 -->
            <div class="back-bar">
                <a href="../blog/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回博客主页</a>
            </div>

            <div id="postContainer">
                <div class="post-loading"><i class="fas fa-spinner fa-pulse"></i>加载文章中...</div>
            </div>
        </div>
    </section>

    <!-- ===== 移动端目录 ===== -->
    <div class="toc-mobile" id="tocMobile">
        <div class="toc-toggle" id="tocMobileToggle">
            <span><i class="fas fa-list-ul" style="margin-right:6px;"></i> 文章目录</span>
            <i class="fas fa-chevron-up"></i>
        </div>
        <ul class="toc-list" id="tocMobileList"></ul>
        <div class="toc-close" id="tocMobileClose">收起目录</div>
    </div>
    <button class="toc-float-btn" id="tocFloatBtn" aria-label="打开目录">
        <i class="fas fa-list-ul"></i>
    </button>

    <!-- ===== 底部（极光创） ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span>Aurora Creation Studio</span>
        </div>
    </footer>

    <!-- ===== 公共脚本（成员档案弹窗） ===== -->
    <script src="../assets/js/components.js"></script>

    <script>
        // ============================================================
        // 工具函数
        // ============================================================
        function getQueryParam(name) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function parseMetadata(body) {
            body = typeof body === 'string' ? body : '';
            var result = {
                author: null,
                categories: [],
                avatar: null,
                map: null,
                cleanBody: body
            };

            var authorMatch = body.match(/^作者[：:]\s*(.+?)\s*[\n\r]/i);
            if (!authorMatch) authorMatch = body.match(/^author[：:]\s*(.+?)\s*[\n\r]/i);
            if (authorMatch && authorMatch[1]) {
                result.author = authorMatch[1].trim();
                result.cleanBody = result.cleanBody.replace(/^作者[：:]\s*.+?[\n\r]/, '');
                result.cleanBody = result.cleanBody.replace(/^author[：:]\s*.+?[\n\r]/, '');
            }

            var catMatch = result.cleanBody.match(/^分类[：:]\s*(.+?)\s*[\n\r]/i);
            if (catMatch && catMatch[1]) {
                result.categories = catMatch[1].split(/[,，、\s]+/).filter(function(c) { return c.trim().length > 0; });
                result.cleanBody = result.cleanBody.replace(/^分类[：:]\s*.+?[\n\r]/, '');
            }

            var avatarMatch = result.cleanBody.match(/^头像[：:]\s*(.+?)\s*[\n\r]/i);
            if (!avatarMatch) avatarMatch = result.cleanBody.match(/^avatar[：:]\s*(.+?)\s*[\n\r]/i);
            if (avatarMatch && avatarMatch[1]) {
                result.avatar = avatarMatch[1].trim();
                result.cleanBody = result.cleanBody.replace(/^头像[：:]\s*.+?[\n\r]/, '');
                result.cleanBody = result.cleanBody.replace(/^avatar[：:]\s*.+?[\n\r]/, '');
            }

            var mapMatch = result.cleanBody.match(/^地图[：:]\s*(.+?)\s*[\n\r]/i);
            if (!mapMatch) mapMatch = result.cleanBody.match(/^map[：:]\s*(.+?)\s*[\n\r]/i);
            if (mapMatch && mapMatch[1]) {
                result.map = mapMatch[1].trim();
                result.cleanBody = result.cleanBody.replace(/^地图[：:]\s*.+?[\n\r]/, '');
                result.cleanBody = result.cleanBody.replace(/^map[：:]\s*.+?[\n\r]/, '');
            }

            return result;
        }

        function parseEmbedParams(str) {
            var params = { width: null, height: null };
            if (!str) return params;
            var widthMatch = str.match(/width\s*=\s*["']?([^"'\s]+)["']?/);
            var heightMatch = str.match(/height\s*=\s*["']?([^"'\s]+)["']?/);
            if (widthMatch) params.width = widthMatch[1];
            if (heightMatch) params.height = heightMatch[1];
            return params;
        }

        function renderWithEmbeds(rawBody) {
            rawBody = typeof rawBody === 'string' ? rawBody : '';

            var embedMap = {};

            var processed = rawBody.replace(
                /\[html-embed\s*([^\]]*)\]([\s\S]*?)\[\/html-embed\]/g,
                function(match, paramsStr, content) {
                    var uid = 'EMBED_' + Math.random().toString(36).substring(2, 10);
                    var params = parseEmbedParams(paramsStr);
                    var width = params.width || '100%';
                    var height = params.height || '500px';
                    content = content.replace(/```html\s*/g, '');
                    content = content.replace(/```\s*/g, '');
                    content = content.trim();
                    embedMap[uid] = { width: width, height: height, content: content };
                    return '<!--' + uid + '-->';
                }
            );

            var htmlContent = '';
            try {
                htmlContent = marked.parse(processed, { gfm: true });
            } catch (e) {
                console.warn('Markdown 解析失败', e);
                htmlContent = '<pre>' + processed.replace(/</g, '&lt;') + '</pre>';
            }

            for (var uid in embedMap) {
                var embed = embedMap[uid];
                var escaped = embed.content
                    .replace(/&/g, '&amp;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                var iframeHtml =
                    '<div class="html-embed-wrapper">' +
                    '<iframe srcdoc="' + escaped + '" width="' + embed.width + '" height="' + embed.height +
                    '" style="display:block; border:none; background:#fff; width:' + embed.width + '; height:' + embed.height +
                    ';" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>' +
                    '</div>';
                htmlContent = htmlContent.replace('<!--' + uid + '-->', iframeHtml);
            }

            htmlContent = htmlContent.replace(/<table([\s\S]*?)<\/table>/g, function(match) {
                return '<div class="table-wrap"><table' + match.substring(6) + '</table></div>';
            });

            return htmlContent;
        }

        // 生成目录
        function generateTOC() {
            var postBody = document.querySelector('.post-body');
            if (!postBody) return;

            var headings = postBody.querySelectorAll('h1, h2, h3');
            if (headings.length === 0) {
                var tocList = document.querySelector('.post-toc .toc-list');
                if (tocList) tocList.innerHTML = '<li class="toc-empty">无章节</li>';
                return;
            }

            var tocHtml = '';
            headings.forEach(function(h, index) {
                var tag = h.tagName.toLowerCase();
                var text = h.textContent.trim();
                var id = 'heading-' + index;
                h.id = id;
                var liClass = 'toc-' + tag;
                tocHtml += '<li class="' + liClass + '">';
                tocHtml += '<a href="#' + id + '" data-target="' + id + '">' + text + '</a>';
                tocHtml += '</li>';
            });

            var tocList = document.querySelector('.post-toc .toc-list');
            if (tocList) tocList.innerHTML = tocHtml;

            var tocMobileList = document.getElementById('tocMobileList');
            if (tocMobileList) tocMobileList.innerHTML = tocHtml;

            var allTocLinks = document.querySelectorAll('.post-toc .toc-list a, .toc-mobile .toc-list a');
            var allHeadings = document.querySelectorAll('.post-body h1, .post-body h2, .post-body h3');

            allTocLinks.forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var targetId = this.getAttribute('data-target');
                    var target = document.getElementById(targetId);
                    if (target) {
                        var offset = 80;
                        var top = target.getBoundingClientRect().top + window.scrollY - offset;
                        window.scrollTo({ top: top, behavior: 'smooth' });
                        closeMobileTOC();
                    }
                });
            });

            function updateActiveTOC() {
                var scrollY = window.scrollY;
                var activeIndex = -1;
                for (var i = allHeadings.length - 1; i >= 0; i--) {
                    var h = allHeadings[i];
                    var top = h.getBoundingClientRect().top + window.scrollY - 90;
                    if (scrollY >= top) {
                        activeIndex = i;
                        break;
                    }
                }
                var desktopLinks = document.querySelectorAll('.post-toc .toc-list li');
                desktopLinks.forEach(function(li, idx) {
                    li.classList.toggle('active', idx === activeIndex);
                });
                var mobileLinks = document.querySelectorAll('.toc-mobile .toc-list li');
                mobileLinks.forEach(function(li, idx) {
                    li.classList.toggle('active', idx === activeIndex);
                });
            }

            setTimeout(updateActiveTOC, 200);
            window.addEventListener('scroll', updateActiveTOC);
            window.addEventListener('resize', updateActiveTOC);
        }

        // 移动端目录控制
        var tocMobile = document.getElementById('tocMobile');
        var tocFloatBtn = document.getElementById('tocFloatBtn');
        var tocMobileToggle = document.getElementById('tocMobileToggle');
        var tocMobileClose = document.getElementById('tocMobileClose');

        function openMobileTOC() {
            tocMobile.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileTOC() {
            tocMobile.classList.remove('open');
            document.body.style.overflow = '';
        }
        function toggleMobileTOC() {
            if (tocMobile.classList.contains('open')) closeMobileTOC();
            else openMobileTOC();
        }

        if (tocFloatBtn) tocFloatBtn.addEventListener('click', toggleMobileTOC);
        if (tocMobileToggle) tocMobileToggle.addEventListener('click', toggleMobileTOC);
        if (tocMobileClose) tocMobileClose.addEventListener('click', closeMobileTOC);

        document.addEventListener('click', function(e) {
            if (tocMobile.classList.contains('open')) {
                if (!tocMobile.contains(e.target) && e.target !== tocFloatBtn) {
                    closeMobileTOC();
                }
            }
        });

        // ============================================================
        // ★★★ 加载文章（含作者点击绑定） ★★★
        // ============================================================
        var issueNumber = getQueryParam('id');
        var container = document.getElementById('postContainer');

        if (!issueNumber) {
            container.innerHTML = '<div class="post-error"><i class="fas fa-exclamation-circle"></i>文章编号缺失</div>';
        } else {
            var REPO_OWNER = 'jgcgzs';
            var REPO_NAME = 'acns';
            var apiUrl = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + issueNumber;

            fetch(apiUrl)
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function(issue) {
                    var titleMatch = issue.title.match(/^(\d{4}-\d{2}-\d{2})[- ]?(.*)/);
                    var dateStr = titleMatch ? titleMatch[1] : '未知日期';
                    var displayTitle = titleMatch ? titleMatch[2] || issue.title : issue.title;

                    var body = issue.body || '';
                    var meta = parseMetadata(body);
                    var cleanBody = meta.cleanBody || '';
                    var customAuthor = meta.author;
                    var categories = meta.categories;
                    var customAvatar = meta.avatar;
                    var mapLink = meta.map;

                    var authorName = customAuthor || issue.user.login;
                    var authorAvatar = customAvatar || issue.user.avatar_url;

                    // 检测是否仅包含单个 html-embed
                    var isOnlyEmbed = false;
                    var trimmed = cleanBody.trim();
                    if (trimmed.match(/^\[html-embed\s*[^\]]*\][\s\S]*\[\/html-embed\]\s*$/)) {
                        isOnlyEmbed = true;
                    }

                    var htmlContent = renderWithEmbeds(cleanBody);

                    var html = '';
                    html += '<div class="post-wrapper' + (isOnlyEmbed ? ' embed-fullscreen' : '') + '">';
                    html += '<div class="post-main">';
                    html += '<div class="post-header">';
                    html += '<div class="post-title">' + displayTitle + '</div>';
                    html += '<div class="post-meta">';
                    html += '<span>' + dateStr + '</span>';
                    // ★★★ 作者元素添加 data-author 属性和点击事件 ★★★
                    html += '<span class="author" data-author="' + authorName + '">';
                    html += '<img src="' + authorAvatar + '" alt="' + authorName + '">';
                    html += '<span class="name">' + authorName + '</span>';
                    html += '</span>';
                    html += '</div>';
                    if (categories.length > 0) {
                        html += '<div class="post-categories">';
                        categories.forEach(function(cat) {
                            html += '<span class="cat">' + cat.trim() + '</span>';
                        });
                        html += '</div>';
                    }
                    html += '</div>'; // .post-header

                    html += '<div class="post-body">' + htmlContent + '</div>';

                    if (mapLink) {
                        var mapUrl = 'https://github.com/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + mapLink;
                        if (/^\d+$/.test(mapLink)) {
                            mapUrl = 'https://github.com/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + mapLink;
                        }
                        html += '<div class="post-map-link">';
                        html += '<i class="fas fa-map-marked-alt" style="margin-right:6px;"></i> 关联地图：<a href="' + mapUrl +
                            '" target="_blank">' + mapLink + '</a>';
                        html += '</div>';
                    }

                    html += '</div>'; // .post-main

                    if (!isOnlyEmbed) {
                        html += '<div class="post-toc" id="postTOC">';
                        html += '<div class="toc-title"><i class="fas fa-list-ul"></i> 目录</div>';
                        html += '<ul class="toc-list"></ul>';
                        html += '</div>';
                    }

                    html += '</div>'; // .post-wrapper

                    container.innerHTML = html;
                    document.title = displayTitle + ' · 极创博客';

                    if (!isOnlyEmbed) {
                        setTimeout(generateTOC, 100);
                    } else {
                        closeMobileTOC();
                    }

                    // ============================================================
                    // ★★★ 绑定作者点击事件（打开成员档案弹窗） ★★★
                    // ============================================================
                    var authorEl = container.querySelector('.post-meta .author');
                    if (authorEl) {
                        authorEl.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var authorName = this.getAttribute('data-author');
                            if (authorName && typeof window.openMemberModal === 'function') {
                                window.openMemberModal(authorName);
                            } else if (authorName) {
                                // 降级：如果公共组件未加载，尝试加载成员数据并打开
                                console.warn('openMemberModal 未定义，尝试加载成员数据...');
                                // 可以在这里添加备用逻辑
                                alert('成员档案功能加载中，请稍后重试');
                            }
                        });
                    }
                })
                .catch(function(err) {
                    console.warn('文章加载失败:', err);
                    container.innerHTML =
                        '<div class="post-error"><i class="fas fa-exclamation-circle"></i>加载失败，请稍后重试<br><span style="font-size:.8rem;opacity:.6;">' +
                        err.message + '</span></div>';
                });
        }

        // ============================================================
        // 导航菜单交互
        // ============================================================
        var menuToggle = document.getElementById('menuToggle');
        var navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            navLinks.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                navLinks.classList.remove('open');
            }
        });
        document.querySelectorAll('.nav-link').forEach(function(link) {
            link.addEventListener('click', function() {
                navLinks.classList.remove('open');
            });
        });

        console.log('>> 极创博客 · 文章详情页（作者点击已启用）');
    </script>
</body>
</html>
