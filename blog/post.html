<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文章详情 - 极光创工作室</title>
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 公共组件样式 -->
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        /* ===== 博客详情独有样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f9fe;
            color: #1a2a3a;
            line-height: 1.8;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --blue-primary: #1a7fc4;
            --blue-primary-dark: #0f6aad;
            --blue-bg-light: #ecf5fa;
            --blue-bg-pale: #f5f9fe;
            --white: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --radius: 2px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--blue-primary);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: var(--radius);
        }
        .nav-links li a:hover {
            background: var(--blue-bg-light);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        .back-bar {
            padding: 16px 0 8px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--blue-primary);
            padding: 6px 16px;
            border: 1px solid var(--blue-primary);
            border-radius: var(--radius);
            transition: background 0.25s, color 0.25s;
            cursor: pointer;
            background: transparent;
        }
        .back-btn:hover {
            background: var(--blue-primary);
            color: #fff;
        }

        .post-header {
            margin-bottom: 24px;
        }
        .post-header .post-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 14px;
            border: 1.5px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .post-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .post-header .post-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .post-header .post-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-header .post-meta i {
            font-size: 13px;
            opacity: 0.5;
        }
        .post-header .post-meta .author-link {
            cursor: pointer;
            color: var(--blue-primary);
            font-weight: 500;
        }
        .post-header .post-meta .author-link:hover {
            text-decoration: underline;
        }

        .post-body {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 32px 36px;
            box-shadow: var(--shadow-sm);
            font-size: 16px;
            line-height: 1.9;
            color: var(--text-dark);
        }
        .post-body p {
            margin-bottom: 16px;
        }
        .post-body p:last-child {
            margin-bottom: 0;
        }
        .post-body h2,
        .post-body h3 {
            margin: 24px 0 12px;
            font-weight: 700;
        }
        .post-body h2 {
            font-size: 24px;
        }
        .post-body h3 {
            font-size: 20px;
        }
        .post-body ul,
        .post-body ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }
        .post-body li {
            margin-bottom: 4px;
        }
        .post-body blockquote {
            border-left: 4px solid var(--blue-primary);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-muted);
            background: var(--blue-bg-light);
            padding: 12px 20px;
            border-radius: var(--radius);
        }
        .post-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 12px 0;
            border: 1px solid var(--border-light);
        }
        .post-body code {
            background: var(--blue-bg-light);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 14px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }
        .post-body pre {
            background: #1a2a3a;
            color: #eef5ff;
            padding: 16px 20px;
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.6;
            margin: 12px 0;
        }
        .post-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        .loading-state,
        .error-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .loading-state i {
            display: block;
            font-size: 32px;
            color: var(--blue-primary);
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links li a {
                padding: 10px 16px;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }
            .post-header h1 {
                font-size: 26px;
            }
            .post-body {
                padding: 20px 18px;
            }
            .navbar-brand .brand-text {
                font-size: 17px;
            }
            .navbar-brand .logo {
                height: 28px;
            }
            .back-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        @media (max-width: 480px) {
            .post-header h1 {
                font-size: 22px;
            }
            .post-body {
                padding: 16px 14px;
                font-size: 15px;
            }
            .post-header .post-meta {
                font-size: 13px;
                gap: 8px 16px;
            }
            .container {
                padding: 0 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../">主站</a></li>
                <li><a href="../map/">地图库</a></li>
                <li><a href="../blog/" class="active">极创博客</a></li>
                <li><a href="../Management/">管理层成员公示</a></li>
                <li><a href="../Management/member.html">成员档案</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 文章详情 ===== -->
    <main>
        <div class="container">
            <div class="back-bar">
                <a href="../blog/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回博客主页</a>
            </div>

            <div id="postContent">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i>加载文章...</div>
            </div>
        </div>
    </main>

    <!-- ===== 弹窗结构（公共组件） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-inner" id="modalInner">
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <!-- ===== 底部 ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span> Aurora Creation Studio</span>
        </div>
    </footer>

    <!-- 引入公共脚本 -->
    <script src="../assets/js/components.js"></script>

    <script>
        (function() {

            // ===== 移动端菜单 =====
            const toggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ============================================================
            // 获取文章ID
            // ============================================================
            function getQueryParam(name) {
                var url = new URL(window.location.href);
                return url.searchParams.get(name);
            }

            var postId = getQueryParam('id');
            var container = document.getElementById('postContent');

            if (!postId) {
                container.innerHTML = '<div class="error-state">缺少文章ID</div>';
                return;
            }

            // ============================================================
            // 解析工具（使用公共函数）
            // ============================================================
            var parseDateFromBody = window.parseDateFromBody || function(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]),
                            month = parseInt(match[2]),
                            day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        }
                    }
                }
                return null;
            };

            // ============================================================
            // 解析成员Issue（增加荣誉、灵动岛字段）
            // ============================================================
            function parseMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [],
                    minid = '未知',
                    id = '未知',
                    joinDate = '未知',
                    avatar = '',
                    background = '',
                    bio = '',
                    pinnedMap = '',
                    pinnedBlog = '',
                    role = '';
                var workHonors = '',
                    gameHonors = '',
                    liveType = '',
                    liveContent = '';
                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^工作室荣誉[：:]\s*(.+)/)) {
                        workHonors = trimmed.replace(/^工作室荣誉[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^游戏荣誉[：:]\s*(.+)/)) {
                        gameHonors = trimmed.replace(/^游戏荣誉[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^灵动岛类型[：:]\s*(.+)/)) {
                        liveType = trimmed.replace(/^灵动岛类型[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^灵动岛内容[：:]\s*(.+)/)) {
                        liveContent = trimmed.replace(/^灵动岛内容[：:]\s*/, '').trim();
                    }
                });
                if (groups.length === 0 && (role === '室长' || role === '副室长')) groups = ['管理层'];
                if (bio) bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
                return { name, role, groups, minid, id, joinDate, avatar, background, bio, pinnedMap, pinnedBlog,
                         workHonors, gameHonors, liveType, liveContent };
            }

            // ============================================================
            // 加载文章
            // ============================================================
            function loadPost() {
                container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i>加载文章...</div>';

                var REPO_OWNER = 'jgcgzs',
                    REPO_NAME = 'acns';
                var postApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + postId;
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';
                var blogApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=blog&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(postApi).then(function(r) { return r.ok ? r.json() : null; }),
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(blogApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var issue = results[0];
                    var memberIssues = results[1] || [];
                    var mapIssues = results[2] || [];
                    var blogIssues = results[3] || [];

                    if (!issue) {
                        container.innerHTML = '<div class="error-state">文章不存在或已被删除</div>';
                        return;
                    }

                    // 解析成员
                    var allMembers = [];
                    if (memberIssues.length) {
                        allMembers = memberIssues.map(function(i) { return parseMemberIssue(i); });
                        allMembers = allMembers.filter(function(m) {
                            if (m.groups && m.groups.length) return true;
                            if (m.role === '室长' || m.role === '副室长') return true;
                            return false;
                        });
                    }
                    // 挂载到全局供弹窗使用
                    window._memberData = allMembers;

                    // 解析地图（简单格式）
                    var allMaps = mapIssues.map(function(i) {
                        var title = i.title && i.title.trim() !== '' ? i.title.trim() : '未命名地图';
                        var body = i.body || '';
                        var author = '',
                            cover = '',
                            tag = '',
                            dateStr = '未知';
                        var lines = body.split('\n');
                        lines.forEach(function(line) {
                            var trimmed = line.trim();
                            if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '')
                            .trim();
                        });
                        var d = parseDateFromBody(body);
                        if (d) dateStr = d;
                        return { id: i.number, title: title, author: author || '未知作者', cover: cover, tag: tag ||
                                '', date: dateStr };
                    });
                    window._mapData = allMaps;

                    // 解析博客（用于弹窗关联）
                    var allBlogs = blogIssues.map(function(i) {
                        var rawTitle = i.title && i.title.trim() !== '' ? i.title.trim() : '未命名文章';
                        var body = i.body || '';
                        var author = '',
                            category = '';
                        var lines = body.split('\n');
                        lines.forEach(function(line) {
                            var trimmed = line.trim();
                            if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '')
                            .trim();
                            if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                                var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                                category = cats.split(/[,，、\s]+/)[0] || '未分类';
                            }
                        });
                        if (!author) author = i.user ? i.user.login : '未知作者';
                        if (!category) category = '未分类';
                        var dateStr = '未知';
                        var dateMatch = rawTitle.match(/^(\d{4})-(\d{2})-(\d{2})/);
                        if (dateMatch) {
                            var y = parseInt(dateMatch[1]),
                                m = parseInt(dateMatch[2]),
                                d = parseInt(dateMatch[3]);
                            if (y >= 2000 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                                dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                            }
                        }
                        var title = rawTitle.replace(/^\d{4}-\d{2}-\d{2}-/, '').trim() || rawTitle;
                        return { id: i.number, title: title, author: author, category: category, date: dateStr };
                    });
                    window._blogData = allBlogs;

                    // 解析当前文章
                    var body = issue.body || '';
                    var author = '',
                        category = '';
                    var lines = body.split('\n');
                    var contentStart = 0;
                    lines.forEach(function(line, idx) {
                        var trimmed = line.trim();
                        if (trimmed.match(/^作者[：:]\s*(.+)/)) {
                            author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                        } else if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                            var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                            category = cats.split(/[,，、\s]+/)[0] || '未分类';
                        }
                        if (contentStart === 0 && trimmed && !trimmed.match(/^(作者|分类)[：:]/)) {
                            contentStart = idx;
                        }
                    });
                    if (!author || author.trim() === '') author = issue.user ? issue.user.login : '未知作者';
                    if (!category || category.trim() === '') category = '未分类';

                    var dateObj = new Date(issue.created_at);
                    var dateStr = dateObj.getFullYear() + '-' +
                        String(dateObj.getMonth() + 1).padStart(2, '0') + '-' +
                        String(dateObj.getDate()).padStart(2, '0');

                    var contentBody = lines.slice(contentStart).join('\n').trim();
                    if (!contentBody) contentBody = body;

                    // 渲染Markdown
                    function renderMarkdown(text) {
                        var html = text;
                        html = html.replace(/```([\s\S]*?)```/g, function(match, code) {
                            return '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') +
                            '</code></pre>';
                        });
                        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
                            '<img src="$2" alt="$1" loading="lazy">');
                        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                            '<a href="$2" target="_blank" style="color:var(--blue-primary);text-decoration:underline;">$1</a>'
                            );
                        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
                        html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
                        html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
                        html = html.replace(/(<li>.*<\/li>\s*)+/g, '<ul>$&</ul>');
                        html = html.replace(/\n\s*\n/g, '</p><p>');
                        html = html.replace(/([^\n]+)/g, function(match) {
                            var trimmed = match.trim();
                            if (trimmed.startsWith('<h') || trimmed.startsWith('<ul') || trimmed.startsWith(
                                    '<li') || trimmed.startsWith('<blockquote') || trimmed.startsWith(
                                    '<pre') || trimmed.startsWith('<img') || trimmed === '') {
                                return match;
                            }
                            return '<p>' + match + '</p>';
                        });
                        html = html.replace(/<p><\/(p)>/g, '');
                        html = html.replace(/<p><blockquote>/g, '<blockquote>');
                        html = html.replace(/<\/blockquote><\/p>/g, '</blockquote>');
                        html = html.replace(/<p><ul>/g, '<ul>');
                        html = html.replace(/<\/ul><\/p>/g, '</ul>');
                        html = html.replace(/<p><li>/g, '<li>');
                        html = html.replace(/<\/li><\/p>/g, '</li>');
                        return html;
                    }

                    var renderedContent = renderMarkdown(contentBody);

                    var html = '';
                    html += '<div class="post-header">';
                    html += '<span class="post-tag">' + category + '</span>';
                    html += '<h1>' + issue.title + '</h1>';
                    html += '<div class="post-meta">';
                    html += '<span><i class="fas fa-user"></i> <span class="author-link" data-author="' + author +
                        '">' + author + '</span></span>';
                    html += '<span><i class="fas fa-calendar-alt"></i> ' + dateStr + '</span>';
                    html += '</div></div>';
                    html += '<div class="post-body">' + renderedContent + '</div>';

                    container.innerHTML = html;

                    // 绑定作者点击事件（调用公共弹窗）
                    var authorLink = container.querySelector('.author-link');
                    if (authorLink) {
                        authorLink.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var authorName = this.dataset.author;
                            if (typeof window.openMemberModal === 'function') {
                                window.openMemberModal(authorName);
                            } else {
                                alert('公共组件未加载，请检查 assets/js/components.js');
                            }
                        });
                    }
                }).catch(function(err) {
                    console.warn('加载文章失败:', err);
                    container.innerHTML =
                        '<div class="error-state"><i class="fas fa-exclamation-circle" style="display:block;font-size:28px;margin-bottom:10px;color:var(--blue-primary);opacity:0.3;"></i>加载失败，请稍后重试</div>';
                });
            }

            // ============================================================
            // 启动
            // ============================================================
            loadPost();

        })();
    </script>

</body>
</html>
