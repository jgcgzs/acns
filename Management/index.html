<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理层成员公示 - 极光创工作室</title>
    <meta name="description" content="极光创工作室管理层成员公示">
    <link rel="shortcut icon" href="https://user-assets.sxlcdn.com/images/1291382/FuDaZWAs3_92-0wUCjGg2zRMiHe5.png?imageMogr2/strip/auto-orient/thumbnail/64x64>/quality/90!/format/png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 公共组件样式 -->
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        /* ===== 管理层公示独有样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f9fe;
            color: #1a2a3a;
            line-height: 1.7;
            font-size: 16px;
            padding-top: 68px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        :root {
            --blue-primary: #1a7fc4;
            --blue-primary-dark: #0f6aad;
            --blue-bg-light: #ecf5fa;
            --blue-bg-pale: #f5f9fe;
            --white: #ffffff;
            --text-dark: #1a2a3a;
            --text-muted: #4a5a6a;
            --border-light: #dce6ef;
            --shadow-sm: 0 2px 12px rgba(26, 127, 196, 0.07);
            --shadow-hover: 0 8px 28px rgba(26, 127, 196, 0.14);
            --radius: 2px;
            --green-badge: #16a34a;
            --blue-badge: #1a7fc4;
            --purple-badge: #8b5cf6;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #ffffff;
            height: 68px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand .logo {
            height: 36px;
            width: auto;
        }
        .navbar-brand .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
        }
        .nav-links li a {
            display: block;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 500;
            color: #222222;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--blue-primary);
            transition: width 0.25s ease;
            transform: translateX(-50%);
            border-radius: var(--radius);
        }
        .nav-links li a:hover {
            background: var(--blue-bg-light);
            color: var(--blue-primary);
        }
        .nav-links li a:hover::after {
            width: 50%;
        }
        .nav-links li a.active {
            color: var(--blue-primary);
            font-weight: 600;
        }
        .nav-links li a.active::after {
            width: 50%;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #222;
            cursor: pointer;
            padding: 4px 8px;
        }

        .footer {
            background: #1a2a3a;
            color: rgba(255, 255, 255, 0.55);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 48px;
        }
        .footer .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer .sep {
            color: rgba(255, 255, 255, 0.12);
        }

        .page-header {
            padding: 24px 0 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .page-header .sub {
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 180px;
            padding: 8px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--white);
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--blue-primary);
        }
        .search-bar .search-btn {
            background: var(--blue-primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .search-bar .search-btn:hover {
            background: var(--blue-primary-dark);
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .member-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 16px 12px 14px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .member-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--blue-primary);
            transform: translateY(-3px);
        }

        .member-card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--blue-bg-light);
            border: 2px solid var(--border-light);
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--blue-primary);
            font-weight: 700;
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.3s;
        }
        .member-card .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-card:hover .avatar {
            border-color: var(--blue-primary);
        }

        .member-card .name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-top: 4px;
        }

        .member-card .role {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 0px;
        }

        .member-card .groups {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-top: 4px;
        }
        .member-card .groups .g {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 8px;
            border: 1px solid var(--blue-primary);
            color: var(--blue-primary);
            background: transparent;
            border-radius: 2px;
            letter-spacing: 0.2px;
        }

        .member-card .info-row {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 4px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px 12px;
        }
        .member-card .info-row span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .member-card .btn-detail {
            margin-top: 8px;
            padding: 3px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--blue-primary);
            border: 1px solid var(--blue-primary);
            border-radius: var(--radius);
            background: transparent;
            cursor: pointer;
            transition: background 0.25s, color 0.25s;
        }
        .member-card .btn-detail:hover {
            background: var(--blue-primary);
            color: #fff;
        }

        /* 成员属性徽章 - 左上角 */
        .member-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            display: inline-block;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            color: #fff;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            background: var(--blue-badge);
            line-height: 1.4;
            z-index: 1;
        }
        .member-badge.green {
            background: var(--green-badge);
        }
        .member-badge.blue {
            background: var(--blue-badge);
        }
        .member-badge.purple {
            background: var(--purple-badge);
        }

        .empty-placeholder,
        .loading-placeholder {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            opacity: 0.4;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .loading-placeholder i {
            display: block;
            font-size: 28px;
            color: var(--blue-primary);
            margin-bottom: 10px;
        }

        @media (max-width: 992px) {
            .member-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            .navbar {
                height: 60px;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: #fff;
                padding: 12px 24px 20px;
                gap: 2px;
                border-top: 1px solid var(--border-light);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links li a {
                padding: 10px 16px;
                font-size: 16px;
                width: 100%;
                text-align: center;
            }
            .member-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .page-header h1 {
                font-size: 24px;
            }
            .search-bar input {
                min-width: 140px;
            }
            .navbar-brand .brand-text {
                font-size: 17px;
            }
            .navbar-brand .logo {
                height: 28px;
            }
        }
        @media (max-width: 480px) {
            .member-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .member-card {
                padding: 12px 10px;
            }
            .member-card .avatar {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
            .member-card .name {
                font-size: 14px;
            }
            .member-card .role {
                font-size: 11px;
            }
            .container {
                padding: 0 14px;
            }
            .member-card .info-row {
                font-size: 11px;
                gap: 2px 8px;
            }
            .member-badge {
                font-size: 7px;
                padding: 1px 6px;
                top: 4px;
                left: 4px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img class="logo" src="https://user-assets.sxlcdn.com/images/1138507/FnXCnd1-XDIsMnQHRLQD_xUKHJac.jpg?imageMogr2/strip/auto-orient/thumbnail/1200x9000%3E/quality/90!/format/png" alt="极光创工作室logo" loading="lazy" onerror="this.style.display='none'">
                <span class="brand-text">极光创工作室</span>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="../">主站</a></li>
                <li><a href="../map/">地图库</a></li>
                <li><a href="../blog/">极创博客</a></li>
                <li><a href="./" class="active">管理层成员公示</a></li>
                <li><a href="./member.html">成员档案</a></li>
            </ul>
        </div>
    </header>

    <!-- ===== 管理层成员公示 ===== -->
    <main>
        <div class="container">
            <div class="page-header">
                <h1>管理层成员公示</h1>
                <div class="sub">极光创工作室核心管理团队</div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索成员姓名、职位..." />
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
            </div>

            <div class="member-grid" id="memberGrid">
                <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载管理层成员...</div>
            </div>
        </div>
    </main>

    <!-- ===== 弹窗结构（公共组件） ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-inner" id="modalInner">
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <!-- ===== 底部 ===== -->
    <footer class="footer">
        <div class="container">
            <span>极光创工作室</span>
            <span class="sep">·</span>
            <span> Aurora Creation Studio</span>
        </div>
    </footer>

    <!-- 引入公共脚本 -->
    <script src="../assets/js/components.js"></script>

    <script>
        (function() {

            // ===== 移动端菜单 =====
            const toggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            if (toggle && navLinks) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('open');
                });
                document.addEventListener('click', function(e) {
                    if (!navLinks.contains(e.target) && !toggle.contains(e.target)) {
                        navLinks.classList.remove('open');
                    }
                });
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('open');
                    });
                });
            }

            // ============================================================
            // 解析工具（使用公共函数）
            // ============================================================
            var parseDateFromBody = window.parseDateFromBody || function(body) {
                var patterns = [
                    /(\d{4})[-年](\d{1,2})[-月](\d{1,2})[日]?/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                for (var i = 0; i < patterns.length; i++) {
                    var match = body.match(patterns[i]);
                    if (match) {
                        var year = parseInt(match[1]),
                            month = parseInt(match[2]),
                            day = parseInt(match[3]);
                        if (year >= 2000 && year <= 2100 && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                            return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                        }
                    }
                }
                return null;
            };

            // ============================================================
            // 解析成员Issue
            // ============================================================
            function parseMemberIssue(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名成员';
                var body = issue.body || '';
                var groups = [],
                    minid = '未知',
                    id = '未知',
                    joinDate = '未知',
                    avatar = '',
                    background = '',
                    bio = '',
                    pinnedMap = '',
                    pinnedBlog = '',
                    role = '';
                var parts = title.split('-');
                var name = parts[0].trim();
                if (parts.length > 1) role = parts.slice(1).join('-').trim();
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^组别[：:]\s*(.+)/)) {
                        var g = trimmed.replace(/^组别[：:]\s*/, '').trim();
                        groups = g.split(/[,，、\s]+/).filter(function(s) { return s.trim().length > 0; });
                    } else if (trimmed.match(/^迷你号[：:]\s*(.+)/)) {
                        minid = trimmed.replace(/^迷你号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^编号[：:]\s*(.+)/)) {
                        id = trimmed.replace(/^编号[：:]\s*/, '').trim() || '未知';
                    } else if (trimmed.match(/^入室时间[：:]\s*(.+)/)) {
                        var d = trimmed.replace(/^入室时间[：:]\s*/, '').trim();
                        var parsed = parseDateFromBody(d);
                        if (parsed) joinDate = parsed;
                        else joinDate = d || '未知';
                    } else if (trimmed.match(/^头像[：:]\s*(.+)/)) {
                        avatar = trimmed.replace(/^头像[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^背景[：:]\s*(.+)/)) {
                        background = trimmed.replace(/^背景[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^简介[：:]\s*(.+)/)) {
                        bio = trimmed.replace(/^简介[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶地图[：:]\s*(.+)/)) {
                        pinnedMap = trimmed.replace(/^置顶地图[：:]\s*/, '').trim();
                    } else if (trimmed.match(/^置顶博客[：:]\s*(.+)/)) {
                        pinnedBlog = trimmed.replace(/^置顶博客[：:]\s*/, '').trim();
                    }
                });
                if (groups.length === 0 && (role === '室长' || role === '副室长')) groups = ['管理层'];
                if (bio) bio = bio.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');

                // 解析成员属性
                var attrType = '未知';
                if (id && id.length >= 1) {
                    var firstChar = id.charAt(0);
                    if (firstChar === '1') attrType = '正式成员';
                    else if (firstChar === '2') attrType = '外部成员';
                    else if (firstChar === '3') attrType = '特招成员';
                }

                return { name, role, groups, minid, id, joinDate, avatar, background, bio, pinnedMap, pinnedBlog,
                    attrType };
            }

            // ============================================================
            // 解析地图和博客（用于弹窗关联）
            // ============================================================
            function parseMapForModal(issue) {
                var title = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名地图';
                var body = issue.body || '';
                var author = '',
                    cover = '',
                    tag = '',
                    dateStr = '未知';
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    if (trimmed.match(/^封面[：:]\s*(.+)/)) cover = trimmed.replace(/^封面[：:]\s*/, '').trim();
                    if (trimmed.match(/^标签[：:]\s*(.+)/)) tag = trimmed.replace(/^标签[：:]\s*/, '').trim();
                });
                var d = parseDateFromBody(body);
                if (d) dateStr = d;
                return { id: issue.number, title: title, author: author || '未知作者', cover: cover, tag: tag || '',
                    date: dateStr };
            }

            function parseBlogForModal(issue) {
                var rawTitle = issue.title && issue.title.trim() !== '' ? issue.title.trim() : '未命名文章';
                var body = issue.body || '';
                var author = '',
                    category = '';
                var lines = body.split('\n');
                lines.forEach(function(line) {
                    var trimmed = line.trim();
                    if (trimmed.match(/^作者[：:]\s*(.+)/)) author = trimmed.replace(/^作者[：:]\s*/, '').trim();
                    if (trimmed.match(/^分类[：:]\s*(.+)/)) {
                        var cats = trimmed.replace(/^分类[：:]\s*/, '').trim();
                        category = cats.split(/[,，、\s]+/)[0] || '未分类';
                    }
                });
                if (!author) author = issue.user ? issue.user.login : '未知作者';
                if (!category) category = '未分类';
                var dateStr = '未知';
                var dateMatch = rawTitle.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (dateMatch) {
                    var y = parseInt(dateMatch[1]),
                        m = parseInt(dateMatch[2]),
                        d = parseInt(dateMatch[3]);
                    if (y >= 2000 && y <= 2100 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                        dateStr = y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    }
                }
                var title = rawTitle.replace(/^\d{4}-\d{2}-\d{2}-/, '').trim() || rawTitle;
                return { id: issue.number, title: title, author: author, category: category, date: dateStr };
            }

            // ============================================================
            // 状态
            // ============================================================
            var allMembers = [];
            var filteredMembers = [];
            var allMaps = [];
            var allBlogs = [];

            var grid = document.getElementById('memberGrid');
            var searchInput = document.getElementById('searchInput');
            var searchBtn = document.getElementById('searchBtn');

            // ============================================================
            // 渲染成员卡片
            // ============================================================
            function renderMemberCard(member) {
                var avatarHtml = (member.avatar && member.avatar.trim().startsWith('http')) ?
                    '<img src="' + member.avatar.trim() + '" alt="' + member.name + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                    member.name.charAt(0);

                var groupsHtml = member.groups && member.groups.length ?
                    member.groups.map(function(g) { return '<span class="g">' + g + '</span>'; }).join('') : '';

                var badgeHtml = '';
                var badgeClass = '';
                if (member.attrType === '正式成员') badgeClass = 'green';
                else if (member.attrType === '外部成员') badgeClass = 'blue';
                else if (member.attrType === '特招成员') badgeClass = 'purple';
                if (badgeClass) {
                    badgeHtml = '<span class="member-badge ' + badgeClass + '">' + member.attrType + '</span>';
                }

                return '<div class="member-card" data-name="' + member.name + '" data-role="' + member.role + '">' +
                    badgeHtml +
                    '<div class="avatar">' + avatarHtml + '</div>' +
                    '<div class="name">' + member.name + '</div>' +
                    (member.role ? '<div class="role">' + member.role + '</div>' : '') +
                    (groupsHtml ? '<div class="groups">' + groupsHtml + '</div>' : '') +
                    '<div class="info-row">' +
                    '<span><i class="fas fa-id-card"></i> ' + member.id + '</span>' +
                    '<span><i class="fas fa-gamepad"></i> ' + member.minid + '</span>' +
                    '</div>' +
                    '<button class="btn-detail" data-name="' + member.name + '">查看详情</button>' +
                    '</div>';
            }

            // ============================================================
            // 分页渲染
            // ============================================================
            function renderPage() {
                var total = filteredMembers.length;
                if (total === 0) {
                    grid.innerHTML = '<div class="empty-placeholder">没有匹配的管理层成员</div>';
                    return;
                }

                var html = '';
                filteredMembers.forEach(function(m) { html += renderMemberCard(m); });
                grid.innerHTML = html;

                grid.querySelectorAll('.btn-detail').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var name = this.dataset.name;
                        var member = allMembers.find(function(m) { return m.name === name; });
                        if (member) {
                            // 挂载到全局供弹窗使用
                            window._memberData = allMembers;
                            window._mapData = allMaps;
                            window._blogData = allBlogs;
                            if (typeof window.openMemberModal === 'function') {
                                window.openMemberModal(name);
                            } else {
                                alert('公共组件未加载，请检查 assets/js/components.js');
                            }
                        }
                    });
                });
            }

            // ============================================================
            // 筛选
            // ============================================================
            function applyFilters() {
                var searchTerm = searchInput.value.trim().toLowerCase();

                filteredMembers = allMembers.filter(function(m) {
                    if (searchTerm) {
                        var inName = m.name.toLowerCase().includes(searchTerm);
                        var inRole = (m.role || '').toLowerCase().includes(searchTerm);
                        if (!inName && !inRole) return false;
                    }
                    return true;
                });

                var roleOrder = { '室长': 0, '副室长': 1, '组长': 2, '副组长': 3 };
                filteredMembers.sort(function(a, b) {
                    var aOrder = 99,
                        bOrder = 99;
                    for (var key in roleOrder) {
                        if ((a.role || '').includes(key)) aOrder = roleOrder[key];
                        if ((b.role || '').includes(key)) bOrder = roleOrder[key];
                    }
                    if (aOrder !== bOrder) return aOrder - bOrder;
                    return a.name.localeCompare(b.name);
                });

                renderPage();
            }

            // ============================================================
            // 加载数据
            // ============================================================
            function loadMembers() {
                grid.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i>加载管理层成员...</div>';

                var REPO_OWNER = 'jgcgzs',
                    REPO_NAME = 'acns';
                var memberApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=member&state=open&sort=created&direction=desc&per_page=100';
                var mapApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=map&state=open&sort=created&direction=desc&per_page=100';
                var blogApi = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME +
                    '/issues?labels=blog&state=open&sort=created&direction=desc&per_page=100';

                Promise.all([
                    fetch(memberApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(mapApi).then(function(r) { return r.ok ? r.json() : []; }),
                    fetch(blogApi).then(function(r) { return r.ok ? r.json() : []; })
                ]).then(function(results) {
                    var memberIssues = results[0] || [];
                    var mapIssues = results[1] || [];
                    var blogIssues = results[2] || [];

                    allMaps = mapIssues.map(function(i) { return parseMapForModal(i); });
                    allBlogs = blogIssues.map(function(i) { return parseBlogForModal(i); });

                    if (memberIssues.length) {
                        var parsed = memberIssues.map(function(i) { return parseMemberIssue(i); });
                        var mgmtRoles = ['室长', '副室长', '组长', '副组长'];
                        allMembers = parsed.filter(function(m) {
                            return mgmtRoles.some(function(role) {
                                return m.role && m.role.includes(role);
                            });
                        });
                    } else {
                        allMembers = [];
                    }

                    // 挂载到全局供弹窗使用
                    window._memberData = allMembers;
                    window._mapData = allMaps;
                    window._blogData = allBlogs;

                    applyFilters();
                }).catch(function(err) {
                    console.warn('加载管理层成员失败:', err);
                    allMembers = [];
                    applyFilters();
                });
            }

            // ============================================================
            // 搜索事件
            // ============================================================
            searchBtn.addEventListener('click', applyFilters);
            searchInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') applyFilters(); });

            // ============================================================
            // 启动
            // ============================================================
            loadMembers();

        })();
    </script>

</body>
</html>
